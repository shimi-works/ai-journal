<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0d0f13">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="AI Journal">
<title>AI Journal ― AIと綴る日記</title>
<style>
/* ===== テーマ ===== */
:root {
  --bg: #0d0f13;
  --surface: #171a21;
  --surface-2: #1e222b;
  --border: #2a2f3a;
  --text: #e8e9ec;
  --muted: #8a8f98;
  --accent: #7aa2f7;
  --chart-score: #5f87e8;  /* dataviz検証済み（dark面・CVD分離PASS） */
  --chart-mood: #6f9e49;
  --sun: #e08a8a;
  --sat: #7a9cd9;
  --radius: 14px;
  --font: "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic UI", system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); }
body {
  font-family: var(--font);
  line-height: 1.7; font-size: 16px;
}
#app { max-width: 600px; margin: 0 auto; padding: 16px 16px 120px; }
button { font-family: inherit; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.muted { color: var(--muted); }
svg.icn { vertical-align: -0.18em; flex-shrink: 0; }
.meta-row .icn { vertical-align: -0.25em; }

/* ===== 共通部品 ===== */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 0 16px; }
.topbar h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.04em; flex: 1; text-align: center; }
.icon-btn {
  background: none; border: none; color: var(--muted); font-size: 20px; line-height: 1;
  cursor: pointer; padding: 8px; border-radius: 50%; min-width: 40px;
  transition: color 180ms ease, background 180ms ease;
}
.icon-btn:hover { color: var(--text); background: var(--surface); }
.icon-btn:disabled { opacity: 0.25; pointer-events: none; }
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px;
}
button.primary {
  display: block; width: 100%; padding: 16px; font-size: 16px; font-weight: 600;
  color: #0d0f13; background: var(--accent); border: none; border-radius: var(--radius);
  cursor: pointer; transition: filter 180ms ease, transform 180ms ease;
}
button.primary:hover { filter: brightness(1.1); }
button.primary:active { transform: scale(0.99); }
button.ghost {
  display: block; width: 100%; padding: 12px; font-size: 14px;
  color: var(--text); background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; transition: background 180ms ease;
}
button.ghost:hover { background: var(--surface-2); }
.stack > * + * { margin-top: 8px; }
.stack-lg > * + * { margin-top: 16px; }

/* ===== セグメント切替 ===== */
.seg { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; gap: 4px; }
.seg button {
  flex: 1; padding: 8px; font-size: 14px; border: none; border-radius: 10px;
  background: none; color: var(--muted); cursor: pointer; transition: background 180ms ease, color 180ms ease;
}
.seg button.active { background: var(--surface-2); color: var(--text); font-weight: 600; }

/* ===== リスト ===== */
.month-head { font-size: 20px; font-weight: 700; margin: 24px 0 12px; }
.entry-item {
  display: flex; gap: 16px; width: 100%; text-align: left; padding: 16px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  cursor: pointer; color: var(--text);
  transition: background 180ms ease, border-color 180ms ease;
}
.entry-item:hover { background: var(--surface-2); }
.date-col { display: flex; flex-direction: column; align-items: center; min-width: 48px; flex-shrink: 0; }
.date-col .dow { font-size: 13px; color: var(--muted); }
.date-col .dow.sun { color: var(--sun); }
.date-col .dow.sat { color: var(--sat); }
.date-col .day { font-size: 34px; font-weight: 700; line-height: 1.2; }
.date-col .time { font-size: 12px; color: var(--muted); margin-top: 4px; }
.body-col { flex: 1; min-width: 0; }
.title-row { display: flex; align-items: flex-start; gap: 8px; }
.title-row .title { flex: 1; font-size: 18px; font-weight: 700; line-height: 1.5; }
.title-row .mood-big { line-height: 1.4; padding-top: 2px; }
.snippet {
  font-size: 14.5px; color: #b9bdc4; margin-top: 4px;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.meta-row { font-size: 12.5px; color: var(--muted); margin-top: 8px; display: flex; gap: 12px; }
.empty-note { color: var(--muted); font-size: 14px; padding: 24px 8px; text-align: center; }
.otd-head { font-size: 13px; color: var(--muted); margin: 8px 0; letter-spacing: 0.06em; }
.otd-years { font-size: 13px; color: var(--accent); font-weight: 700; white-space: nowrap; }

/* ===== 新機能のお知らせ ===== */
.notice-card { margin-bottom: 16px; border-color: var(--accent); }
.notice-title { font-weight: 700; font-size: 14.5px; margin-bottom: 6px; }
.notice-body { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 12px; }
.notice-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.notice-actions button { flex: 1; min-width: 120px; }

/* ===== 継続（ストリーク） ===== */
.streak-card { margin-bottom: 16px; }
.streak-card .icn, .streak-note .icn { color: #ff9e64; }
.streak-note { font-size: 12.5px; color: var(--muted); margin: 0 0 12px; display: flex; align-items: center; gap: 4px; }

/* ===== ネタ帳 ===== */
.topic-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
.topic-item .topic-open {
  flex: 1; min-width: 0; text-align: left; background: none; border: none; padding: 0;
  color: var(--text); cursor: pointer; font-family: inherit; font-size: 14.5px; line-height: 1.6;
}
.topic-item .topic-date { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }
.topic-item .bulb-mark { color: #FFD166; }
.topic-check {
  flex-shrink: 0; background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);
  border-radius: 999px; padding: 6px 12px; font-size: 12.5px; cursor: pointer;
  transition: color 180ms ease, border-color 180ms ease;
}
.topic-check:hover { color: var(--text); border-color: var(--accent); }
.topic-item.done .topic-open { text-decoration: line-through; color: var(--muted); }
.ai-topics { margin-top: 8px; font-size: 13.5px; color: #c8ccd4; }
.ai-topics .icn { color: #FFD166; }
.topics-sec details { margin-top: 16px; }
.topics-sec summary { cursor: pointer; font-size: 13px; color: var(--muted); list-style: none; }
.topics-sec summary::-webkit-details-marker { display: none; }

/* ===== write ===== */
.ask-label { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.score-row { display: flex; gap: 4px; }
.score-row button {
  flex: 1; aspect-ratio: 1; min-width: 0; font-size: 14px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border); color: var(--muted); cursor: pointer;
  transition: background 180ms ease, color 180ms ease, border-color 180ms ease;
}
.score-row button.active { background: var(--accent); border-color: var(--accent); color: #0d0f13; font-weight: 700; }
.mood-row { display: flex; gap: 8px; }
.mood-row button {
  flex: 1; padding: 10px 0 8px; border-radius: var(--radius);
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: var(--surface); border: 1px solid var(--border); cursor: pointer;
  transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
}
.mood-row button.active { border-color: var(--accent); background: var(--surface-2); transform: scale(1.05); }
.mood-row .mood-name { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; }
.write input[type="text"] {
  width: 100%; padding: 12px 0; font-size: 18px; font-weight: 600;
  background: none; border: none; color: var(--text); font-family: inherit;
}
.write input[type="text"]::placeholder, .write textarea::placeholder { color: #565c68; }
.write textarea {
  width: 100%; min-height: 40vh; padding: 8px 0; font-size: 16px; line-height: 1.9;
  background: none; border: none; color: var(--text); resize: vertical; font-family: inherit;
}
.write .hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px; }
.topbar h1[data-action="pick-date"] { cursor: pointer; border-radius: 10px; padding: 4px 8px; transition: background 180ms ease; }
.topbar h1[data-action="pick-date"]:hover { background: var(--surface); }
/* 日付選択ポップアップ（iOSでネイティブピッカーが開けないため自前カレンダー） */
.date-pop {
  position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  width: min(360px, calc(100vw - 32px)); z-index: 30;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.date-pop[hidden] { display: none; }
.date-pop .cal-cell { aspect-ratio: auto; padding: 8px 0; font-size: 13px; }
.date-pop button.cal-cell { cursor: pointer; color: var(--text); border-radius: 10px; transition: background 180ms ease; }
.date-pop button.cal-cell:hover { background: var(--surface-2); }
.date-pop button.cal-cell.sel { background: var(--accent); color: #0d0f13; font-weight: 700; }
.date-pop button.cal-cell.today { border-color: var(--accent); }
.date-pop .cal-cell.off { opacity: 0.3; }
.write input[type="text"]:focus-visible, .write textarea:focus-visible { outline: none; } /* 画面全体が編集領域なので枠は出さない */

/* ===== entry ===== */
.entry-view .date-line { font-size: 14px; color: var(--muted); margin-bottom: 4px; }
.entry-view h2 { font-size: 22px; margin-bottom: 8px; }
.entry-view .badges { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; font-size: 15px; }
.badge { background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 2px 12px; font-size: 13.5px; }
.entry-view .weather-line { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.entry-view .body { white-space: pre-wrap; font-size: 16px; }
.entry-ai { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }
.ai-summary {
  background: var(--surface); border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0;
  padding: 8px 12px; font-size: 14.5px; color: #c8ccd4;
}
.meta-row { flex-wrap: wrap; row-gap: 2px; }

/* ===== 振り返り ===== */
.period-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
.period-head .label { font-size: 17px; font-weight: 700; }
.period-head .stats { font-size: 12.5px; color: var(--muted); }
.digest-text { font-size: 15px; white-space: pre-wrap; }
.digest-actions { margin-top: 12px; }
.digest-actions button.small {
  padding: 8px 16px; font-size: 13px; width: auto; display: inline-block;
}
.stale-note { font-size: 12px; color: var(--muted); margin-top: 8px; }

/* ===== グラフ ===== */
.tiles { display: flex; gap: 8px; }
.tile { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; }
.tile .num { font-size: 22px; font-weight: 700; }
.tile .cap { font-size: 12px; color: var(--muted); }
.chart-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.chart-wrap { position: relative; }
.chart-wrap svg { display: block; width: 100%; height: auto; touch-action: pan-y; }
.chart-tip {
  position: absolute; pointer-events: none; background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 8px; padding: 4px 10px; font-size: 12.5px; white-space: nowrap;
  transform: translate(-50%, -130%); opacity: 0; transition: opacity 120ms ease;
}

/* ===== settings ===== */
.settings-row { padding: 16px 0; border-bottom: 1px solid var(--border); }
.settings-row .label { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.settings-row input[type="password"], .settings-row input[type="text"], .settings-row input[type="time"], .settings-row select {
  width: 100%; padding: 12px; font-size: 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: inherit;
}
.settings-row a { color: var(--accent); }
.swatch-row { display: flex; gap: 12px; }
.swatch {
  width: 36px; height: 36px; border-radius: 50%; border: 2px solid transparent; cursor: pointer;
  transition: transform 180ms ease, border-color 180ms ease;
}
.swatch.active { border-color: var(--text); transform: scale(1.12); }

/* ===== 検索 ===== */
.search-lbl {
  display: flex; align-items: center; gap: 4px; font-size: 12.5px; color: var(--muted);
  background: none; border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px;
  cursor: pointer; white-space: nowrap; transition: color 180ms ease, background 180ms ease;
}
.search-lbl:hover { color: var(--text); background: var(--surface); }
.search-box {
  width: 100%; padding: 12px 16px; font-size: 16px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: inherit;
}
.search-box::placeholder { color: #565c68; }

/* ===== ヘルプ ===== */
.help-sec details {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
}
.help-sec summary {
  cursor: pointer; padding: 14px 16px; font-weight: 600; font-size: 15px;
  list-style: none; display: flex; gap: 10px; align-items: center;
  transition: background 180ms ease; border-radius: var(--radius);
}
.help-sec summary::-webkit-details-marker { display: none; }
.help-sec summary:hover { background: var(--surface-2); }
.help-sec details[open] summary { border-bottom: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; }
.help-sec .hbody { padding: 12px 16px 16px; font-size: 14.5px; color: #c8ccd4; line-height: 1.9; }
.help-sec .hbody p { margin: 0 0 10px; }
.help-sec .hbody p:last-child { margin-bottom: 0; }
.help-sec .hbody b { color: var(--text); }
.help-sec .hbody .key { background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 0 6px; font-size: 13px; }

/* ===== カレンダー ===== */
.cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.cal-head .cal-title { font-size: 17px; font-weight: 700; }
.cal-dow { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
.cal-dow span { text-align: center; font-size: 12px; color: var(--muted); }
.cal-dow span.sun { color: var(--sun); }
.cal-dow span.sat { color: var(--sat); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-cell {
  aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1px; border-radius: 10px; border: 1px solid transparent; background: none; color: var(--muted);
  font-size: 12px; font-family: inherit;
}
.cal-cell.has { background: var(--surface); border-color: var(--border); color: var(--text); cursor: pointer; transition: background 180ms ease; }
.cal-cell.has:hover { background: var(--surface-2); }
.cal-cell.today { border-color: var(--accent); }
.cal-cell .mark { font-size: 16px; line-height: 1.2; }
.cal-cell .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-top: 4px; }

/* ===== ロック ===== */
.lock-view { display: flex; flex-direction: column; align-items: center; gap: 16px; padding-top: 30vh; }
.lock-view .lock-icon { font-size: 40px; }
.lock-view input {
  width: 240px; padding: 12px 16px; font-size: 16px; text-align: center; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: inherit;
}
.lock-view button.primary { width: 240px; }

/* ===== ナビ・FAB・toast ===== */
#nav {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 999px; padding: 6px; z-index: 10;
}
#nav[hidden] { display: none; }  /* display:flexがhidden属性を上書きしないように */
#nav button {
  border: none; background: none; color: var(--muted); font-size: 12px; cursor: pointer;
  padding: 8px 11px; border-radius: 999px; display: flex; flex-direction: column; align-items: center; gap: 2px;
  white-space: nowrap; transition: background 180ms ease, color 180ms ease;
}
/* タブが6つになったので、狭い画面では詰めてはみ出しを防ぐ */
@media (max-width: 430px) { #nav button { padding: 8px 7px; font-size: 11px; } }
#nav button .ico { height: 20px; display: flex; align-items: center; }
#nav button.active { background: var(--surface-2); color: var(--text); }
#fab {
  position: fixed; right: calc(50% - 300px + 24px); bottom: 96px; width: 56px; height: 56px;
  border-radius: 50%; border: none; background: var(--accent); color: #0d0f13;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 10; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  transition: filter 180ms ease, transform 180ms ease;
}
#fab[hidden] { display: none; }
@media (max-width: 632px) { #fab { right: 24px; } }
#fab:hover { filter: brightness(1.1); }
#fab:active { transform: scale(0.95); }
#toast {
  position: fixed; left: 50%; bottom: 96px; transform: translate(-50%, 8px);
  background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
  padding: 8px 16px; border-radius: 10px; font-size: 14px; max-width: 90vw;
  opacity: 0; pointer-events: none; transition: opacity 200ms ease, transform 200ms ease; z-index: 20;
}
#toast.show { opacity: 1; transform: translate(-50%, 0); }

/* ===== 画像・テーマソング ===== */
.img-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
.img-strip[hidden] { display: none; }
.img-thumb { position: relative; width: 80px; height: 80px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); background: var(--surface); }
.img-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.img-del {
  position: absolute; top: 2px; right: 2px; width: 22px; height: 22px; border-radius: 50%;
  border: none; background: rgba(13,15,19,0.72); color: #fff; font-size: 15px; line-height: 22px;
  cursor: pointer; padding: 0; text-align: center;
}
.img-del:hover { background: rgba(13,15,19,0.92); }
.song-fields > * + * { margin-top: 8px; }
.song-fields input {
  width: 100%; padding: 12px; font-size: 15px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: inherit;
}
.song-fields input::placeholder { color: #565c68; }
.song-card {
  display: flex; align-items: center; gap: 10px; width: 100%;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 8px 10px; color: var(--text); font-family: inherit; font-size: inherit; text-align: left;
}
.song-card img, .song-card .song-art-ph {
  width: 44px; height: 44px; border-radius: 8px; flex: none; object-fit: cover;
}
.song-card .song-art-ph { display: flex; align-items: center; justify-content: center; background: var(--surface-2); color: var(--accent); }
.song-card .song-meta { flex: 1; min-width: 0; }
.song-card .song-meta .t { font-size: 14.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.song-card .song-meta .a { font-size: 12.5px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.song-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--surface-2); color: var(--text); cursor: pointer; flex: none;
  display: flex; align-items: center; justify-content: center; padding: 0; text-decoration: none;
}
.song-btn:hover { border-color: var(--accent); }
.song-results { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
button.song-card { cursor: pointer; }
button.song-card:hover { border-color: var(--accent); }
.entry-song { margin-bottom: 16px; }
.entry-images { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 8px; margin-top: 20px; }
.entry-img { padding: 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--surface); cursor: zoom-in; aspect-ratio: 1; }
.entry-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.lightbox {
  position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.9);
  display: flex; align-items: center; justify-content: center; padding: 16px; cursor: zoom-out;
}
.lightbox[hidden] { display: none; }
.lightbox img { max-width: 100%; max-height: 100%; border-radius: 8px; }
</style>
</head>
<body>
<div id="app"></div>
<nav id="nav" hidden>
  <button data-action="nav" data-view="list"><span class="ico"></span>リスト</button>
  <button data-action="nav" data-view="calendar"><span class="ico"></span>カレンダー</button>
  <button data-action="nav" data-view="review"><span class="ico"></span>振り返り</button>
  <button data-action="nav" data-view="graph"><span class="ico"></span>グラフ</button>
  <button data-action="nav" data-view="topics"><span class="ico"></span>ネタ帳</button>
  <button data-action="nav" data-view="settings"><span class="ico"></span>設定</button>
</nav>

function migrateData(d) {
  if (d.v === 1) {
    for (const e of d.entries) {
      if (!("mood" in e)) e.mood = null;
      if (!("score" in e)) e.score = null;
    }
    if (!d.settings.model) d.settings.model = MODEL_POOL[0];
    // v1のdigestsは weekly/monthly/yearly キーだった（中身は空のはずだが念のため引き継ぐ）
    const dg = d.digests || {};
    d.digests = { week: dg.weekly || {}, month: dg.monthly || {}, year: dg.yearly || {} };
    d.v = 2;
  }
  if (d.v === 2) {
    if (!("passcodeHash" in d.settings)) d.settings.passcodeHash = null;
    if (!d.settings.theme) d.settings.theme = { accent: "blue", font: "gothic", fontSize: "m" };
    d.v = 3;
  }
  if (d.v === 3) {
    // 画像添付・テーマソングを追加。既存日記は空で補完する
    for (const e of d.entries) {
      if (!Array.isArray(e.images)) e.images = [];
      if (!("song" in e)) e.song = null;
    }
    d.v = 4;
  }
  // バックアップ記録（後付けフィールド。バージョンを上げず既定値で吸収）
  if (!("lastBackupAt" in d.settings)) d.settings.lastBackupAt = null;
  if (!("lastBackupCount" in d.settings)) d.settings.lastBackupCount = 0;
  if (!("backupSnoozedUntil" in d.settings)) d.settings.backupSnoozedUntil = null;
  if (!("lastSeenNotice" in d.settings)) d.settings.lastSeenNotice = null;
  if (!("googleClientId" in d.settings)) d.settings.googleClientId = "";
  if (!("reminderTime" in d.settings)) d.settings.reminderTime = "21:00";
  if (!d.settings.push || typeof d.settings.push !== "object") {
    d.settings.push = { serverUrl: "", vapidPublicKey: "", enabled: false, endpoint: null };
  }
  if (!d.usedTopics || typeof d.usedTopics !== "object") d.usedTopics = {};
  // 後付けフィールドの保険（v4以降のデータで欠けていても吸収する）
  for (const e of d.entries) {
    if (!Array.isArray(e.images)) e.images = [];
    if (!("song" in e)) e.song = null;
  }
  return d;
}

// ===== パスワード（簡易ロック。データ自体の暗号化ではない） =====
async function hashText(s) {
  const input = "aij:" + s;
  if (crypto.subtle) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(input));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
  }
  // 非セキュアコンテキスト用フォールバック（簡易ロックなので割り切る）
  let h = 5381;
  for (const c of input) h = (h * 33 ^ c.codePointAt(0)) >>> 0;
  return "djb2:" + h.toString(16);
}

async function tryUnlock() {
  const input = document.getElementById("lockPass");
  if (!input) return;   // 顔認証モードの画面にはパスワード欄がない
  const h = await hashText(input.value);
  if (h === state.data.settings.passcodeHash) {
    state.view = "list";
    render();
  } else {
    input.value = "";
    toast("パスワードが違います");
  }
}

// 設定済みパスワードの本人確認（設定変更・解除時）
async function verifyCurrentPass() {
  if (!state.data.settings.passcodeHash) return true;
  const cur = prompt("現在のパスワードを入力してください");
  if (cur === null) return false;
  if (await hashText(cur) !== state.data.settings.passcodeHash) {
    toast("パスワードが違います");
    return false;
  }
  return true;
}

// ===== 顔認証・指紋でのロック解除（WebAuthn = Face ID / Windows Hello） =====
// 顔や指紋そのものはOSが管理しアプリには一切渡らない。ここでは「OSの本人確認に成功したか」
// だけを見る（パスワードロックと同じ覗き見防止の割り切り）。認証情報は端末固有なので、
// 同期やバックアップJSONに乗らないよう state.data の外の専用キーに保存する。
const BIO_KEY = "ai-journal-bio";

function bioRec() {
  try { return JSON.parse(localStorage.getItem(BIO_KEY)); } catch { return null; }
}
function bufToB64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
function b64urlToBuf(s) {
  const b = atob(String(s).replace(/-/g, "+").replace(/_/g, "/"));
  const a = new Uint8Array(b.length);
  for (let i = 0; i < b.length; i++) a[i] = b.charCodeAt(i);
  return a.buffer;
}
// 参考用: 端末が生体認証を確実に使えるかの判定。UIの出し分けには使わない
// （iOSで偽陰性の報告があるため、ボタンは出して失敗時に理由を表示する方針）
async function detectBioAvailable() {
  try {
    return !!(window.PublicKeyCredential &&
      await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable());
  } catch { return false; }
}
async function bioEnable() {
  // 注意: 先にprompt()等のダイアログを出すと「ボタンを押した」というユーザー操作の
  // 扱いが消費され、iOSのSafariがWebAuthn登録を拒否する。そのため生体認証の登録を
  // 先に行い、パスワードの本人確認はその後（保存する前）に行う。
  let cred;
  try {
    cred = await navigator.credentials.create({ publicKey: {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      rp: { name: "AI Journal" },
      user: { id: crypto.getRandomValues(new Uint8Array(16)), name: "日記の持ち主", displayName: "日記の持ち主" },
      pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
      authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
      timeout: 60000,
      attestation: "none"
    } });
  } catch (e) {
    console.error(e);
    toast(e.name === "NotAllowedError"
      ? "顔認証の登録がキャンセルまたは拒否されました"
      : "顔認証を設定できませんでした（" + (e.message || e.name) + "）");
    return;
  }
  if (!await verifyCurrentPass()) return;   // 本人確認できなければ登録は保存しない
  localStorage.setItem(BIO_KEY, JSON.stringify({ credId: bufToB64url(cred.rawId) }));
  render();
  toast("顔認証・指紋でのロック解除を有効にしました（この端末のみ）");
}
function bioDisable() {
  localStorage.removeItem(BIO_KEY);
  render();
  toast("顔認証でのロック解除を無効にしました");
}
let bioBusy = false;   // 認証ダイアログの二重起動防止
async function bioUnlock(auto) {
  const rec = bioRec();
  if (!rec || !rec.credId || bioBusy) return;
  bioBusy = true;
  try {
    await navigator.credentials.get({ publicKey: {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      allowCredentials: [{ type: "public-key", id: b64urlToBuf(rec.credId), transports: ["internal"] }],
      userVerification: "required",
      timeout: 60000
    } });
    state.view = "list";
    state.lockShowPass = false;
    render();
  } catch (e) {
    console.error(e);
    // 自動起動分の失敗（未対応・ジェスチャー必須など）は黙ってボタン待ちに戻す。
    // 手動でもキャンセル(NotAllowedError)は無言。それ以外はパスワードでの救済を案内
    if (!auto && e.name !== "NotAllowedError") toast("顔認証で開けませんでした（「パスワードで開く」も使えます）");
  } finally { bioBusy = false; }
}

function downloadFile(filename, text, mime) {
  const a = document.createElement("a");
  const blob = new Blob([text], { type: mime });
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ===== 画像ストレージ（IndexedDB） =====
// localStorageは数MBしか入らず写真ですぐ溢れるので、画像Blobはこちらに置き、
// 日記(entry)側には画像IDの参照だけを持たせる。バックアップ時はbase64で書き出す。
let mediaDbPromise = null;
function openMediaDB() {
  if (mediaDbPromise) return mediaDbPromise;
  mediaDbPromise = new Promise((resolve, reject) => {
    let req;
    try { req = indexedDB.open(MEDIA_DB, 1); }
    catch (e) { reject(e); return; }
    req.onupgradeneeded = () => {
      if (!req.result.objectStoreNames.contains(MEDIA_STORE)) req.result.createObjectStore(MEDIA_STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return mediaDbPromise;
}
function idbReq(req) {
  return new Promise((resolve, reject) => {
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function mediaStore(mode) {
  const db = await openMediaDB();
  return db.transaction(MEDIA_STORE, mode).objectStore(MEDIA_STORE);
}
async function imagePut(id, rec) { return idbReq((await mediaStore("readwrite")).put(rec, id)); }
async function imageGet(id)      { return idbReq((await mediaStore("readonly")).get(id)); }
async function imageDelete(id)   { return idbReq((await mediaStore("readwrite")).delete(id)); }
async function imageKeys()       { return idbReq((await mediaStore("readonly")).getAllKeys()); }

// 表示用のobjectURLはid単位でキャッシュ（再描画のたびに作り直さない）
const imgUrlCache = new Map();
async function imageUrl(id) {
  if (imgUrlCache.has(id)) return imgUrlCache.get(id);
  try {
    const rec = await imageGet(id);
    if (!rec || !rec.blob) return null;
    const url = URL.createObjectURL(rec.blob);
    imgUrlCache.set(id, url);
    return url;
  } catch (e) { console.error(e); return null; }
}

let imgCounter = 0;
function newImageId() { return `img_${Date.now().toString(36)}_${(imgCounter++).toString(36)}`; }

// 画像を長辺IMAGE_MAX_DIMに縮小し、JPEGに再エンコードして容量を抑える
function processImageFile(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      const scale = Math.min(1, IMAGE_MAX_DIM / Math.max(img.width, img.height));
      const w = Math.max(1, Math.round(img.width * scale));
      const h = Math.max(1, Math.round(img.height * scale));
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff";   // 透過PNGを平らな白背景に（JPEGは透明を持てない）
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => {
        blob ? resolve({ blob, w, h, type: "image/jpeg" }) : reject(new Error("画像の変換に失敗しました"));
      }, "image/jpeg", IMAGE_JPEG_QUALITY);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("画像を読み込めませんでした")); };
    img.src = url;
  });
}

// 選んだ画像を縮小・保存して下書きに足す
async function addDraftImages(files) {
  const list = [...files].filter(f => f.type.startsWith("image/"));
  if (!list.length) { toast("画像ファイルを選んでください"); return; }
  toast(`画像を処理中…（${list.length}枚）`);
  let ok = 0;
  for (const file of list) {
    try {
      const { blob, w, h, type } = await processImageFile(file);
      const id = newImageId();
      await imagePut(id, { blob, w, h, type });
      state.draft.images.push({ id, w, h });
      ok++;
    } catch (e) { console.error(e); toast(e.message || "画像を追加できませんでした"); }
  }
  await renderDraftImages();
  if (ok) toast(`写真を${ok}枚追加しました`);
}

// 保存(commit=true)なら「消された元画像」を、破棄(commit=false)なら「今回足した画像」をIDBから削除
function cleanupDraftImages(commit) {
  const orig = new Set(state.draftImagesOrig || []);
  const draftIds = new Set(state.draft.images.map(im => im.id));
  if (commit) {
    for (const id of orig) if (!draftIds.has(id)) imageDelete(id).catch(() => {});
  } else {
    for (const im of state.draft.images) if (!orig.has(im.id)) imageDelete(im.id).catch(() => {});
  }
  state.draftImagesOrig = [];
}

// ===== バックアップ用のBlob⇄dataURL =====
function blobToDataUrl(blob) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(r.error);
    r.readAsDataURL(blob);
  });
}
function dataUrlToBlob(dataUrl) {
  const [head, b64] = String(dataUrl).split(",");
  const mime = (head.match(/:(.*?);/) || [])[1] || "image/jpeg";
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

// エクスポート用データ: 通常のデータ + 参照中の画像をbase64で同梱（1ファイルで完全復元できる）
async function buildBackupPayload() {
  const ids = new Set();
  for (const e of state.data.entries) for (const im of (e.images || [])) ids.add(im.id);
  const media = {};
  for (const id of ids) {
    try {
      const rec = await imageGet(id);
      if (rec && rec.blob) media[id] = { data: await blobToDataUrl(rec.blob), w: rec.w, h: rec.h, type: rec.type };
    } catch (e) { console.error("backup image skip:", id, e); }
  }
  return { ...state.data, media };
}

// インポート時に画像を復元。インポートは全置き換えなので既存の画像はいったん全消しする
async function restoreMedia(media) {
  try {
    const keys = await imageKeys();
    for (const k of keys) await imageDelete(k);
    imgUrlCache.forEach(url => URL.revokeObjectURL(url));
    imgUrlCache.clear();
    if (!media || typeof media !== "object") return;
    for (const [id, m] of Object.entries(media)) {
      if (!m || !m.data) continue;
      await imagePut(id, { blob: dataUrlToBlob(m.data), w: m.w, h: m.h, type: m.type || "image/jpeg" });
    }
  } catch (e) { console.error(e); toast("画像の復元中に問題が発生しました"); }
}

// 他アプリからの移行用: 日付見出しで区切られたテキスト/Markdownを日記として追加する。
// 対応例: "## 2026-07-08（水）21:30 タイトル"（本アプリのMD） / "## 2026-07-08 タイトル" /
//         "# 2026/7/8 タイトル" / "2026年7月8日" だけの行
const DATE_HEAD_RE = /^(?:#{1,3}\s*)?(\d{4})[-/年](\d{1,2})[-/月](\d{1,2})日?(?:（[日月火水木金土]）)?\s*(?:(\d{1,2}):(\d{2}))?\s*(.*)$/;

function parseTextImport(text) {
  const found = [];
  let cur = null;
  for (const line of text.split(/\r?\n/)) {
    const m = line.match(DATE_HEAD_RE);
    const isHead = m && Number(m[2]) >= 1 && Number(m[2]) <= 12 && Number(m[3]) >= 1 && Number(m[3]) <= 31;
    if (isHead) {
      if (cur) found.push(cur);
      cur = {
        date: `${m[1]}-${pad(Number(m[2]))}-${pad(Number(m[3]))}`,
        time: m[4] ? `${pad(Number(m[4]))}:${m[5]}` : "00:00",
        title: (m[6] || "").trim(),
        bodyLines: []
      };
    } else if (cur) {
      cur.bodyLines.push(line);
    }
  }
  if (cur) found.push(cur);
  return found.map(f => {
    // 本アプリのMDエクスポートのメタ行（"> 🙂 良い　8点…"）から気分・点数を復元する
    let mood = null, score = null;
    const bodyLines = [...f.bodyLines];
    while (bodyLines.length && !bodyLines[0].trim()) bodyLines.shift();
    if (bodyLines[0] && bodyLines[0].startsWith(">")) {
      const metaLine = bodyLines[0];
      const sm = metaLine.match(/(\d{1,2})点/);
      if (sm) score = Math.min(SCORE_MAX, Number(sm[1]));
      for (const mo of MOODS) if (metaLine.includes(mo.emoji)) { mood = mo.value; break; }
      bodyLines.shift();
    }
    return { date: f.date, time: f.time, title: f.title, mood, score, body: bodyLines.join("\n").trim() };
  }).filter(f => f.body || f.title);
}

function importTextEntries(text) {
  const parsed = parseTextImport(text);
  if (!parsed.length) {
    toast("日付見出しが見つかりませんでした（例: ## 2026-07-08 タイトル）");
    return;
  }
  let added = 0, skipped = 0;
  const usedIds = new Set(state.data.entries.map(e => e.id));
  for (const f of parsed) {
    const dup = state.data.entries.some(e =>
      e.date === f.date && e.title === f.title && e.body === f.body);
    if (dup) { skipped++; continue; }
    // 別ファイルを複数回インポートしても衝突しないよう、既存IDを避けてミリ秒部を採番する
    let ms = added % 1000, id;
    do { id = `${f.date}T${f.time}:00.${String(ms).padStart(3, "0")}`; ms = (ms + 1) % 1000; }
    while (usedIds.has(id));
    usedIds.add(id);
    state.data.entries.push({
      id,
      date: f.date,
      weekday: WEEKDAYS[new Date(f.date + "T12:00:00").getDay()],
      time: f.time,
      title: f.title, body: f.body, mood: f.mood, score: f.score,
      weather: null, location: state.data.settings.location.name, ai: null,
      images: [], song: null
    });
    added++;
  }
  saveData();
  state.view = "list";
  render();
  toast(`${added}件追加しました${skipped ? `（重複${skipped}件はスキップ）` : ""}`);
}

// ===== zipインポート（シンプル日記などのHTML+写真エクスポート） =====
// 外部ライブラリなしでzipを読む。deflateの伸長はブラウザ標準のDecompressionStreamに任せる。
// シンプル日記のエクスポートは「2026_4_10_Fri_00_38_Diary8/index.html + Attachment.png」という
// 1日記=1フォルダ構造で、日付・時刻はフォルダ名から取れる。

function zipEntries(buf) {
  const view = new DataView(buf);
  const u8 = new Uint8Array(buf);
  // EOCD(末尾レコード)を後ろから探す。zipコメントは最大65535バイトなのでその範囲だけ見る
  let eocd = -1;
  const min = Math.max(0, buf.byteLength - 65558);
  for (let i = buf.byteLength - 22; i >= min; i--) {
    if (view.getUint32(i, true) === 0x06054b50) { eocd = i; break; }
  }
  if (eocd < 0) throw new Error("zipファイルとして読めませんでした");
  const count = view.getUint16(eocd + 10, true);
  let off = view.getUint32(eocd + 16, true);
  const utf8 = new TextDecoder("utf-8");
  const entries = [];
  for (let i = 0; i < count; i++) {
    if (off + 46 > buf.byteLength || view.getUint32(off, true) !== 0x02014b50) break;
    const method = view.getUint16(off + 10, true);
    const csize = view.getUint32(off + 20, true);
    const nameLen = view.getUint16(off + 28, true);
    const extraLen = view.getUint16(off + 30, true);
    const commentLen = view.getUint16(off + 32, true);
    const localOff = view.getUint32(off + 42, true);
    const name = utf8.decode(u8.subarray(off + 46, off + 46 + nameLen));
    if (!name.endsWith("/")) entries.push({ name, method, csize, localOff });
    off += 46 + nameLen + extraLen + commentLen;
  }
  return entries;
}

async function zipExtract(buf, entry, type) {
  const view = new DataView(buf);
  const o = entry.localOff;
  if (view.getUint32(o, true) !== 0x04034b50) throw new Error("zipの構造が壊れています");
  const nameLen = view.getUint16(o + 26, true);
  const extraLen = view.getUint16(o + 28, true);
  const start = o + 30 + nameLen + extraLen;
  const comp = buf.slice(start, start + entry.csize);
  if (entry.method === 0) return new Blob([comp], { type: type || "" });
  if (entry.method !== 8) throw new Error("未対応の圧縮方式です");
  const ds = new DecompressionStream("deflate-raw");
  const blob = await new Response(new Blob([comp]).stream().pipeThrough(ds)).blob();
  return type ? new Blob([blob], { type }) : blob;
}

const ZIP_IMG_MIME = { png: "image/png", jpg: "image/jpeg", jpeg: "image/jpeg", gif: "image/gif", webp: "image/webp" };

// シンプル日記のindex.html（Cocoa HTML Writer）: 最初のp.p1がタイトル、以降のpが本文1行ずつ、
// 写真は本文中の<img src="Attachment.png">。imgを抜いてからtextContentで文章だけ拾う
function parseDiaryHtml(htmlText) {
  const doc = new DOMParser().parseFromString(htmlText, "text/html");
  const imgSrcs = [];
  if (!doc.body) return { title: "", body: "", imgSrcs };
  for (const img of doc.body.querySelectorAll("img")) {
    const src = img.getAttribute("src") || "";
    if (src && !/^(https?:|data:)/i.test(src)) {
      try { imgSrcs.push(decodeURIComponent(src).split("/").pop()); } catch { imgSrcs.push(src.split("/").pop()); }
    }
    img.remove();
  }
  let title = "";
  const lines = [];
  const ps = [...doc.body.querySelectorAll("p")];
  for (const p of ps) {
    const text = p.textContent.replace(/\u00a0/g, " ").replace(/\s+$/, "");
    if (!title && p.classList.contains("p1") && text.trim()) { title = text.trim(); continue; }
    lines.push(text);
  }
  if (!ps.length) lines.push(doc.body.textContent.trim());
  while (lines.length && !lines[0].trim()) lines.shift();
  while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
  return { title, body: lines.join("\n"), imgSrcs };
}

// フォルダ名 "2026_4_10_Fri_00_38_Diary8" → 日付2026-04-10・時刻00:38
const ZIP_DIR_RE = /^(\d{4})_(\d{1,2})_(\d{1,2})_[A-Za-z]{3}_(\d{1,2})_(\d{2})(_|$)/;

async function importZip(file) {
  if (typeof DecompressionStream !== "function") {
    toast("この端末のブラウザはzip展開に対応していません（バックアップJSONやテキストでのインポートをお使いください）");
    return;
  }
  toast("zipを読み込んでいます…");
  let buf, entries;
  try {
    buf = await file.arrayBuffer();
    entries = zipEntries(buf);
  } catch (e) { console.error(e); toast(e.message || "zipを読み込めませんでした"); return; }

  // 日付つきフォルダごとに html と画像をまとめる
  const diaries = new Map();
  for (const en of entries) {
    const parts = en.name.split("/");
    const base = parts.pop();
    let m = null;
    for (const seg of parts) { m = seg.match(ZIP_DIR_RE); if (m) break; }
    if (!m || !base) continue;
    const dir = parts.join("/");
    if (!diaries.has(dir)) diaries.set(dir, { m, html: null, images: new Map() });
    const d = diaries.get(dir);
    const ext = (base.match(/\.(\w+)$/) || [])[1]?.toLowerCase();
    if (ext === "html" || ext === "htm") d.html = en;
    else if (ZIP_IMG_MIME[ext]) d.images.set(base, en);
  }
  const list = [...diaries.values()].filter(d => d.html);
  if (!list.length) {
    toast("対応する日記が見つかりませんでした（シンプル日記の「日記データの出力」zipに対応しています）");
    return;
  }
  if (!confirm(`zipから日記 ${list.length} 件が見つかりました。今の日記に追加します。よろしいですか？`)) return;

  let added = 0, skipped = 0, photoCount = 0, failed = 0, done = 0;
  const usedIds = new Set(state.data.entries.map(e => e.id));
  for (const d of list) {
    done++;
    try {
      const htmlText = await (await zipExtract(buf, d.html)).text();
      const { title, body, imgSrcs } = parseDiaryHtml(htmlText);
      if (!title && !body && !d.images.size) { skipped++; continue; }
      const date = `${d.m[1]}-${pad(Number(d.m[2]))}-${pad(Number(d.m[3]))}`;
      const time = `${pad(Number(d.m[4]))}:${d.m[5]}`;
      if (state.data.entries.some(e => e.date === date && e.title === title && e.body === body)) { skipped++; continue; }
      // 本文が参照する画像を優先し、参照が拾えなければフォルダ内の画像を全部添付する
      const named = imgSrcs.filter(n => d.images.has(n));
      const picks = named.length ? [...new Set(named)] : [...d.images.keys()].sort();
      const images = [];
      for (const n of picks) {
        try {
          const ext = n.match(/\.(\w+)$/)[1].toLowerCase();
          const blob = await zipExtract(buf, d.images.get(n), ZIP_IMG_MIME[ext]);
          const { blob: jpeg, w, h } = await processImageFile(blob);
          const id = newImageId();
          await imagePut(id, { blob: jpeg, w, h, type: "image/jpeg" });
          images.push({ id, w, h });
          photoCount++;
        } catch (e) { console.error("zip image skip:", n, e); }
      }
      // 同じ日時が既にあっても衝突しないよう、ミリ秒部で採番する（テキストインポートと同じ流儀）
      let ms = added % 1000, id;
      do { id = `${date}T${time}:00.${String(ms).padStart(3, "0")}`; ms = (ms + 1) % 1000; }
      while (usedIds.has(id));
      usedIds.add(id);
      state.data.entries.push({
        id, date,
        weekday: WEEKDAYS[new Date(date + "T12:00:00").getDay()],
        time, title, body, mood: null, score: null,
        weather: null, location: state.data.settings.location.name, ai: null,
        images, song: null
      });
      added++;
      if (done % 10 === 0) toast(`取り込み中… ${done}/${list.length}件`);
    } catch (e) { console.error(e); failed++; }
  }
  saveData();
  state.view = "list";
  render();
  toast(`${added}件追加しました${photoCount ? `（写真${photoCount}枚）` : ""}${skipped ? `・重複などスキップ${skipped}件` : ""}${failed ? `・失敗${failed}件` : ""}`);
}

// ===== 日時ユーティリティ =====
function pad(n) { return String(n).padStart(2, "0"); }
function fmtDate(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }
function fmtTime(d) { return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function todayStr() { return fmtDate(new Date()); }
function displayDate(dateStr) {
  const [y, m, d] = dateStr.split("-");
  return `${y}年${Number(m)}月${Number(d)}日`;
}
function shortDate(dateStr) {
  const [, m, d] = dateStr.split("-");
  return `${Number(m)}/${Number(d)}`;
}
// 週の開始日（月曜）を返す
function weekStartOf(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() - (d.getDay() + 6) % 7);
  return fmtDate(d);
}
function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return fmtDate(d);
}
function periodKeyOf(kind, dateStr) {
  if (kind === "week") return weekStartOf(dateStr);
  if (kind === "month") return dateStr.slice(0, 7);
  return dateStr.slice(0, 4);
}
function periodLabel(kind, key) {
  if (kind === "week") return `${shortDate(key)} 〜 ${shortDate(addDays(key, 6))} の週`;
  if (kind === "month") { const [y, m] = key.split("-"); return `${y}年${Number(m)}月`; }
  return `${key}年`;
}
function isCurrentPeriod(kind, key) {
  return periodKeyOf(kind, todayStr()) === key;
}

// ===== weather層 =====
function weatherEmoji(code) {
  if (code <= 1) return "☀️";
  if (code === 2) return "⛅";
  if (code === 3) return "☁️";
  if (code === 45 || code === 48) return "🌫️";
  if (code >= 95) return "⛈️";
  if ((code >= 71 && code <= 77) || code === 85 || code === 86) return "❄️";
  if (code >= 51) return "🌧️";
  return "🌡️";
}

function weatherLine(w) {
  return `${weatherEmoji(w.code)} ${w.desc} ${w.temp}°C（最高${w.tempMax} / 最低${w.tempMin}）湿度${w.humidity}%`;
}

// 場所検索（Open-Meteoジオコーディング・キー不要）。旅行時の天気取得地点の変更に使う
async function geocodeQuery(name) {
  const url = "https://geocoding-api.open-meteo.com/v1/search"
    + `?name=${encodeURIComponent(name)}&count=5&language=ja&format=json`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`場所の検索に失敗しました (${res.status})`);
  return ((await res.json()).results) || [];
}

async function searchLocations(name) {
  let results = await geocodeQuery(name);
  // このAPIは「京都」「札幌」のような短縮形にヒットしないことがある。「◯◯市」で再検索する
  // （「京都」は「都」で終わる等、接尾辞では除外できないので「市」以外は常にリトライする）
  if (!results.length && /^[぀-ヿ一-鿿]+$/.test(name) && !name.endsWith("市")) {
    results = await geocodeQuery(name + "市");
  }
  return results.map(r => ({
    name: r.name,
    detail: [r.admin1, r.country].filter(Boolean).join("・"),
    lat: r.latitude,
    lon: r.longitude
  }));
}

async function fetchWeather(loc) {
  const url = "https://api.open-meteo.com/v1/forecast"
    + `?latitude=${loc.lat}&longitude=${loc.lon}`
    + "&current=temperature_2m,relative_humidity_2m,weather_code"
    + "&daily=temperature_2m_max,temperature_2m_min"
    + "&forecast_days=1&timezone=auto";
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), WEATHER_TIMEOUT_MS);
  try {
    const res = await fetch(url, { signal: ctrl.signal });
    if (!res.ok) return null;
    const j = await res.json();
    const code = j.current.weather_code;
    return {
      code,
      desc: WMO_DESC[code] || "不明",
      temp: Math.round(j.current.temperature_2m * 10) / 10,
      tempMax: Math.round(j.daily.temperature_2m_max[0] * 10) / 10,
      tempMin: Math.round(j.daily.temperature_2m_min[0] * 10) / 10,
      humidity: Math.round(j.current.relative_humidity_2m)
    };
  } catch (e) {
    return null; // オフライン・タイムアウト時。日記の保存自体は妨げない
  } finally {
    clearTimeout(timer);
  }
}

// ===== Googleカレンダー連携（読み取り専用・サーバー無しのブラウザ内OAuth） =====
// GISライブラリは連携を使う瞬間だけ遅延ロードする（普段はCDN依存ゼロを保つ）
const GCAL_SCOPE = "https://www.googleapis.com/auth/calendar.readonly";
let gcalToken = null;   // { token, exp } メモリのみ（トークンは永続化しない）

function loadGis() {
  return new Promise((resolve, reject) => {
    if (window.google && google.accounts && google.accounts.oauth2) return resolve();
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.onload = () => resolve();
    s.onerror = () => reject(new Error("Google連携ライブラリを読み込めませんでした（オフライン？）"));
    document.head.appendChild(s);
  });
}

async function getGoogleToken() {
  const clientId = state.data.settings.googleClientId;
  if (!clientId) throw new Error("NO_CLIENT_ID");
  if (gcalToken && Date.now() < gcalToken.exp) return gcalToken.token;
  await loadGis();
  return new Promise((resolve, reject) => {
    const tc = google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: GCAL_SCOPE,
      callback: r => {
        if (r && r.access_token) {
          gcalToken = { token: r.access_token, exp: Date.now() + (Number(r.expires_in || 3000) - 60) * 1000 };
          resolve(r.access_token);
        } else {
          reject(new Error((r && r.error) || "認証に失敗しました"));
        }
      },
      error_callback: () => reject(new Error("認証がキャンセルされました"))
    });
    tc.requestAccessToken();
  });
}

async function fetchCalendarEvents(date, token) {
  const timeMin = new Date(date + "T00:00:00").toISOString();
  const timeMax = new Date(date + "T23:59:59").toISOString();
  const url = "https://www.googleapis.com/calendar/v3/calendars/primary/events"
    + "?singleEvents=true&orderBy=startTime&maxResults=20"
    + `&timeMin=${encodeURIComponent(timeMin)}&timeMax=${encodeURIComponent(timeMax)}`;
  const res = await fetch(url, { headers: { Authorization: "Bearer " + token } });
  if (!res.ok) throw new Error(`カレンダーの取得に失敗しました (${res.status})`);
  const j = await res.json();
  return (j.items || []).filter(ev => ev.status !== "cancelled").map(ev => ({
    time: ev.start && ev.start.dateTime ? ev.start.dateTime.slice(11, 16) : "終日",
    title: ev.summary || "（無題の予定）"
  }));
}

const EVENTS_HEADING = "【この日の予定】";

async function insertCalendarEvents() {
  const body = document.getElementById("body");
  if (body.value.includes(EVENTS_HEADING)) { toast("すでに挿入済みです"); return; }
  try {
    const token = await getGoogleToken();
    const events = await fetchCalendarEvents(state.draft.date, token);
    if (!events.length) { toast("この日の予定は見つかりませんでした"); return; }
    const block = `${EVENTS_HEADING}\n${events.map(ev => `・${ev.time} ${ev.title}`).join("\n")}\n\n`;
    body.value = block + body.value;
    body.focus();
    body.setSelectionRange(body.value.length, body.value.length);
  } catch (err) {
    if (err.message === "NO_CLIENT_ID") {
      toast("設定でGoogleクライアントIDを登録してください");
      state.view = "settings"; render();
    } else {
      toast(err.message);
    }
  }
}

// ===== ai層（プロバイダー抽象。実装はGemini・無料枠直叩き） =====
async function aiGenerate(prompt, schema, maxTokens = 1200) {
  const key = state.data.settings.apiKey;
  if (!key) throw new Error("NO_KEY");
  const pool = [state.data.settings.model, ...MODEL_POOL.filter(m => m !== state.data.settings.model)];
  for (let mi = 0; mi < pool.length; mi++) {
    const model = pool[mi];
    const gc = { responseMimeType: "application/json", responseSchema: schema, maxOutputTokens: maxTokens };
    if (/2\.5/.test(model)) gc.thinkingConfig = { thinkingBudget: 0 };  // 思考OFF指定は2.5系のみ対応
    const body = { contents: [{ parts: [{ text: prompt }] }], generationConfig: gc };
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`;
    let res;
    for (let attempt = 0; attempt < 3; attempt++) {
      res = await fetch(url, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) });
      if (res.status !== 503 && res.status !== 500) break;   // 高負荷は少し待って自動リトライ
      if (attempt < 2) await new Promise(r => setTimeout(r, 1500 * (attempt + 1)));
    }
    if (res.status === 429 && mi < pool.length - 1) continue;  // 無料枠上限→次のモデルへ
    if (!res.ok) {
      let msg = res.status + " " + res.statusText;
      try { const e = await res.json(); msg = (e.error && e.error.message) || msg; } catch (_) {}
      if (res.status === 400 && /API key|API_KEY/i.test(msg)) msg = "APIキーが無効です。設定を確認してください。";
      if (res.status === 403) msg = "APIキーが無効か権限がありません。設定を確認してください。";
      if (res.status === 429) msg = "無料枠の上限に達しました。しばらく待ってから試してください。";
      if (res.status === 503 || res.status === 500) msg = "AIが一時的に混雑しています。数十秒おいて再試行してください。";
      throw new Error(msg);
    }
    const data = await res.json();
    if (data.promptFeedback && data.promptFeedback.blockReason) throw new Error("内容が安全上の理由でブロックされました。");
    const cand = data.candidates && data.candidates[0];
    const text = ((cand && cand.content && cand.content.parts) || []).map(p => p.text).filter(Boolean).join("");
    if (!text) throw new Error("応答を取得できませんでした。");
    if (model !== state.data.settings.model) { state.data.settings.model = model; saveData(); }  // 通ったモデルを次回優先
    return JSON.parse(text);
  }
}

// ===== 保存時AI処理（T-005: 要約・タグ・感情推定を1コールで） =====
function entryAiPrompt(e) {
  const given = [];
  if (e.mood != null) given.push(`本人の気分入力: ${moodOf(e.mood).name}`);
  if (e.score != null) given.push(`本人の点数入力: ${e.score}点/10点`);
  return `あなたは日記アプリの整理アシスタントです。以下の日記1件を処理してください。

【${e.date}（${e.weekday}）】${e.title || "（タイトルなし）"}
${given.join("　")}
本文:
${e.body.slice(0, ENTRY_AI_BODY_LIMIT)}

次の4つをJSONで返してください:
- summary: 後で振り返ったとき一目で思い出せる1〜3文の要約。簡潔な常体（〜した）で、日記に書かれていることだけを使う
- tags: 話題を表す日本語タグ3〜5個（例: "#大学" "#個人開発" "#読書"。#付き・短く）
- topics: この日記から拾える「人との会話のネタ」を0〜2個。友達や家族につい話したくなる出来事・発見・面白い話を、そのまま話し始められる一言（40字以内）にする。日記に書かれていることだけを使い、無ければ空配列
- emotion: この日の気分の推定を1〜4の整数で（4=とても良い, 3=良い, 2=ふつう, 1=いまいち）`;
}

const aiBusy = new Set();   // 処理中のentry.id（連打・二重実行防止）

async function processEntryAI(entry, opts = {}) {
  if (!state.data.settings.apiKey) {
    // 自動実行時はAIなしで静かに成立させる（ローカルファースト）。手動時だけ設定へ誘導
    if (opts.manual) {
      toast("先に設定画面でGemini APIキーを登録してください");
      state.view = "settings"; render();
    }
    return false;
  }
  if (aiBusy.has(entry.id)) return false;
  aiBusy.add(entry.id);
  const promptBody = entry.body;   // 処理中に本文が編集されたら結果を捨てて作り直すための基準
  let ok = false;
  if (state.view === "entry" && state.entryId === entry.id) render();
  try {
    const r = await aiGenerate(entryAiPrompt(entry), ENTRY_AI_SCHEMA, 800);
    // 生成中に本文が編集されていたら古い要約は捨てる（下で最新の本文でやり直す）
    if (entry.body === promptBody) {
      const tags = (Array.isArray(r.tags) ? r.tags : [])
        .map(t => String(t).trim().replace(/\s+/g, "")).filter(Boolean)
        .map(t => t.startsWith("#") ? t : "#" + t)
        .slice(0, AI_TAGS_MAX);
      const topics = (Array.isArray(r.topics) ? r.topics : [])
        .map(t => String(t).trim()).filter(Boolean)
        .slice(0, AI_TOPICS_MAX);
      const n = Math.round(Number(r.emotion));
      entry.ai = {
        summary: String(r.summary || "").trim(),
        tags,
        topics,
        emotion: n >= 1 && n <= 4 ? n : null,
        createdAt: todayStr()
      };
      saveData();
      ok = true;
    }
  } catch (err) {
    // 失敗しても日記は無傷。自動実行はconsoleに留め、手動実行だけユーザーに知らせる
    if (opts.manual) toast("AI処理に失敗: " + err.message);
    else console.warn("entry AI failed:", err.message);
  } finally {
    aiBusy.delete(entry.id);
    if ((state.view === "entry" && state.entryId === entry.id) || state.view === "list") render();
  }
  if (entry.body !== promptBody) return processEntryAI(entry, opts);
  return ok;
}

// ===== digest層（週間・月間・年間まとめ） =====
function digestPrompt(kind, key, entries) {
  const label = periodLabel(kind, key);
  const opener = { week: "今週", month: "今月", year: "今年" }[kind];
  const unit = { week: "週", month: "月", year: "年" }[kind];
  let source;
  if (kind === "year") {
    // 年間は月間まとめがあればそれを素材に（トークン節約）。なければ各日記のタイトルで代用
    const months = Object.entries(state.data.digests.month)
      .filter(([k]) => k.startsWith(key)).sort()
      .map(([k, v]) => `【${periodLabel("month", k)}】${v.text}`);
    source = months.length
      ? months.join("\n")
      : entries.map(e => `- ${e.date} ${e.title || e.body.slice(0, 60)}`).join("\n");
  } else {
    source = entries.map(e => {
      const mv = effectiveMood(e);
      const mood = mv ? `気分:${moodOf(mv).name}` : "";
      const score = e.score != null ? `${e.score}点` : "";
      // AI要約があればそれを素材にする（本文全文よりトークンが安定して少ない）
      const text = e.ai && e.ai.summary ? e.ai.summary : e.body.slice(0, DIGEST_BODY_LIMIT);
      return `【${e.date}（${e.weekday}）${e.title || ""} ${mood} ${score}】\n${text}`;
    }).join("\n\n");
  }
  return `あなたは私的な日記の振り返り文を書くアシスタントです。
以下は「${label}」に書かれた日記（${entries.length}件）です。

${source}

この期間の振り返りを、次の構成の自然な日本語で書いてください。
「${opener}は〜な${unit}でした。具体的には、〜なことをしたり、〜なことがあったりしました。気分は〜でした。」
- 3〜6文、です・ます調。一人称は「私」を使わず主語は省略する
- 日記に実際に書かれていることだけを使う（推測や創作をしない）
- 点数・気分の記録があれば、その傾向（上向き/安定/波があった等）にも1文触れる`;
}

async function generateDigest(kind, key) {
  const entries = entriesInPeriod(kind, key);
  if (!entries.length) return;
  const genKey = `${kind}:${key}`;
  state.generating = genKey;
  render();
  try {
    const result = await aiGenerate(digestPrompt(kind, key, entries), DIGEST_SCHEMA);
    state.data.digests[kind][key] = { text: result.summary, createdAt: todayStr(), count: entries.length };
    saveData();
  } catch (e) {
    if (e.message === "NO_KEY") {
      toast("先に設定画面でGemini APIキーを登録してください");
      state.view = "settings";
    } else {
      toast("まとめの生成に失敗: " + e.message);
    }
  } finally {
    state.generating = null;
    render();
  }
}

function entriesInPeriod(kind, key) {
  return sortedEntries().filter(e => periodKeyOf(kind, e.date) === key).reverse(); // 古い順
}

// ===== entry操作・集計 =====
function sortedEntries() {
  return [...state.data.entries].sort((a, b) => b.id.localeCompare(a.id));
}

function findEntry(id) {
  return state.data.entries.find(e => e.id === id) || null;
}

function moodOf(value) {
  return MOODS.find(m => m.value === value) || null;
}

// 気分は手動入力が正。未入力のときだけAI推定（ai.emotion）で補完する
function effectiveMood(e) {
  if (e.mood != null) return e.mood;
  return e.ai && e.ai.emotion != null ? e.ai.emotion : null;
}

function average(nums) {
  return nums.length ? nums.reduce((a, b) => a + b, 0) / nums.length : null;
}

function periodStats(entries) {
  const scores = entries.map(e => e.score).filter(v => v != null);
  const moods = entries.map(effectiveMood).filter(v => v != null);
  const avgScore = average(scores);
  const avgMood = average(moods);
  return {
    count: entries.length,
    avgScore: avgScore == null ? null : Math.round(avgScore * 10) / 10,
    avgMoodValue: avgMood == null ? null : Math.round(avgMood)
  };
}

// 連続記録日数。今日未記入でも昨日まで続いていれば継続中（今日中に書けば途切れない）
function calcStreak() {
  const dates = new Set(state.data.entries.map(e => e.date));
  const today = todayStr();
  const wroteToday = dates.has(today);
  let current = 0;
  let d = wroteToday ? today : addDays(today, -1);
  while (dates.has(d)) { current++; d = addDays(d, -1); }
  // 最長記録は全期間から毎回計算（日付数は高々数千なので十分速い）
  let best = 0, run = 0, prev = null;
  for (const dt of [...dates].sort()) {
    run = prev && dayDiff(prev, dt) === 1 ? run + 1 : 1;
    if (run > best) best = run;
    prev = dt;
  }
  return { current, best, wroteToday };
}

// ネタ帳: 全日記のAI抽出ネタを新しい順に平坦化する
function allTopics() {
  const out = [];
  for (const e of sortedEntries()) {
    if (!e.ai || !Array.isArray(e.ai.topics)) continue;
    e.ai.topics.forEach((t, i) =>
      out.push({ key: `${e.id}#${i}`, text: t, entryId: e.id, date: e.date }));
  }
  return out;
}

function saveEntry(title, body, mood, score, date, images, song) {
  const now = new Date();
  const entry = {
    // 日付は指定日（さかのぼり可）、IDは日付+現在時刻ミリ秒で衝突を防ぐ
    id: `${date}T${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}.${String(now.getMilliseconds()).padStart(3, "0")}`,
    date,
    weekday: WEEKDAYS[new Date(date + "T12:00:00").getDay()],
    time: fmtTime(now),
    title, body, mood, score,
    weather: null,
    location: state.data.settings.location.name,
    ai: null,
    images: images || [],
    song: song || null
  };
  state.data.entries.push(entry);
  saveData();
  // 天気は後追いで付与（取得を待たせない・失敗しても日記は残る）。
  // 過去日の日記に「今日の天気」を付けると嘘になるので、当日のみ取得する
  if (date === todayStr()) {
    fetchWeather(state.data.settings.location).then(w => {
      if (!w) return;
      entry.weather = w;
      saveData();
      if (state.view === "list" || (state.view === "entry" && state.entryId === entry.id)) render();
    });
  }
  // AI処理（要約・タグ・感情推定）も裏で。キー未設定・失敗でも日記は成立する
  processEntryAI(entry);
  return entry;
}

// ===== render =====
function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

  4: { color: "#FFB454", feat: '<path d="M6.9 9.9q1.25-1.7 2.5 0"/><path d="M14.6 9.9q1.25-1.7 2.5 0"/><path d="M7.6 13.1c.9 2.7 7.9 2.7 8.8 0z" fill="#22252e" stroke="none"/>' },

};
function moodFaceInner(value) {
  const f = MOOD_FACE[value];
  if (!f) return "";
  return `<circle cx="12" cy="12" r="10" fill="${f.color}"/><g stroke="#22252e" stroke-width="1.8" fill="none" stroke-linecap="round">${f.feat}</g>`;
}
function moodSVG(value, size = 22) {
  if (!MOOD_FACE[value]) return "";
  return `<svg class="icn mood-icn" width="${size}" height="${size}" viewBox="0 0 24 24" role="img" aria-label="${esc(moodOf(value).name)}">${moodFaceInner(value)}</svg>`;
}

// 天気アイコン（WMOコード→種類→SVG）。テキスト書き出しでは従来どおりweatherEmoji()を使う
function weatherKind(code) {
  if (code <= 1) return "sun";
  if (code === 2) return "part";
  if (code === 3) return "cloud";
  if (code === 45 || code === 48) return "fog";
  if (code >= 95) return "storm";
  if ((code >= 71 && code <= 77) || code === 85 || code === 86) return "snow";
  if (code >= 51) return "rain";
  return "cloud";
}
const SUN_RAYS = '<line x1="12" y1="2.8" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21.2"/><line x1="2.8" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21.2" y2="12"/><line x1="5.5" y1="5.5" x2="7.1" y2="7.1"/><line x1="16.9" y1="16.9" x2="18.5" y2="18.5"/><line x1="5.5" y1="18.5" x2="7.1" y2="16.9"/><line x1="16.9" y1="7.1" x2="18.5" y2="5.5"/>';

const CLOUD_HIGH = '<path d="M17.2 15.5H7.1a4 4 0 0 1-.9-7.9A5.4 5.4 0 0 1 16.7 6.4a4.2 4.2 0 0 1 .5 9.1z"/>';
const WEATHER_ICON = {

  part: `<g stroke="#FFB454"><circle cx="8" cy="7.5" r="2.6"/><line x1="8" y1="2.6" x2="8" y2="3.9"/><line x1="3.1" y1="7.5" x2="4.4" y2="7.5"/><line x1="4.5" y1="4" x2="5.4" y2="4.9"/><line x1="11.5" y1="4" x2="10.6" y2="4.9"/></g><g stroke="#9AA3B2"><path d="M18.5 19.5h-8a3.4 3.4 0 0 1-.8-6.7 4.6 4.6 0 0 1 9-1 3.6 3.6 0 0 1-.2 7.7z"/></g>`,
  cloud: `<g stroke="#9AA3B2">${CLOUD_PATH}</g>`,
  fog: `<g stroke="#8A93A8">${CLOUD_HIGH}<line x1="7" y1="18.2" x2="17" y2="18.2"/><line x1="9" y1="21" x2="15" y2="21"/></g>`,
  rain: `<g stroke="#7AA2F7">${CLOUD_HIGH}<line x1="9" y1="18" x2="8.3" y2="20.7"/><line x1="12.7" y1="18" x2="12" y2="20.7"/><line x1="16.4" y1="18" x2="15.7" y2="20.7"/></g>`,
  snow: `<g stroke="#A8D8F0">${CLOUD_HIGH}<circle cx="8.8" cy="19.3" r="0.9" fill="#A8D8F0" stroke="none"/><circle cx="12.5" cy="20.6" r="0.9" fill="#A8D8F0" stroke="none"/><circle cx="16.2" cy="19.3" r="0.9" fill="#A8D8F0" stroke="none"/></g>`,
  storm: `<g stroke="#9AA3B2">${CLOUD_HIGH}</g><path d="M12.8 15.5 10.2 19.6h2.1L11.2 22.8l4.3-5h-2.2l1.4-2.3z" fill="#FFD166"/>`
};
function weatherSVG(code, size = 16) {
  return `<svg class="icn" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${WEATHER_ICON[weatherKind(code)]}</svg>`;

let lastRenderedView = null;
function render() {
  // 画面を移動したら試聴中の曲は止める（裏で鳴り続けないように）
  if (lastRenderedView !== state.view) {
    lastRenderedView = state.view;
    if (previewingUrl) stopPreview();
  }
  const app = document.getElementById("app");
  const views = {
    list: renderList, calendar: renderCalendar, review: renderReview, graph: renderGraph,
    settings: renderSettings, write: renderWrite, entry: renderEntry,
    search: renderSearch, lock: renderLock, help: renderHelp, topics: renderTopics
  };
  app.innerHTML = (views[state.view] || renderList)();

  // ナビとFAB（write中とロック中は隠す）
  const hideChrome = state.view === "write" || state.view === "lock";
  const nav = document.getElementById("nav");
  nav.hidden = hideChrome;
  for (const b of nav.querySelectorAll("button")) {
    b.classList.toggle("active", b.dataset.view === state.view);
  }
  document.getElementById("fab").hidden = hideChrome;

  if (state.view === "write") {
    const body = document.getElementById("body");
    if (body) body.focus();
    renderDraftImages();
  }
  if (state.view === "entry") hydrateImages(app);
  if (state.view === "search") {
    const box = document.getElementById("searchBox");
    if (box) { box.focus(); box.setSelectionRange(box.value.length, box.value.length); }
  }
  if (state.view === "lock") {
    const input = document.getElementById("lockPass");
    if (input) input.focus();
  }
  if (state.view === "graph") attachChartHover();
}

// --- リスト ---
function entryCardHTML(e, opts = {}) {
  const day = Number(e.date.slice(8, 10));
  const dowClass = e.weekday === "日" ? "sun" : e.weekday === "土" ? "sat" : "";
  const title = e.title || e.body.slice(0, SNIPPET_TITLE_LEN);
  const snippet = e.title ? e.body : e.body.slice(SNIPPET_TITLE_LEN);
  const mv = effectiveMood(e);
  const mood = mv ? `<span class="mood-big" data-mood="${mv}">${moodSVG(mv, 24)}</span>` : "";
  const meta = [];   // 各要素はエスケープ済みHTML
  if (opts.withMonth) meta.push(esc(displayDate(e.date)));
  if (e.score != null) meta.push(`${e.score}点`);
  if (e.images && e.images.length) meta.push(`${icon("image", 14)} ${e.images.length}`);
  if (e.song && e.song.title) meta.push(`${icon("music", 14)} ${esc(e.song.title)}`);
  if (e.weather) meta.push(`${weatherSVG(e.weather.code, 15)} ${e.weather.temp}°C`);
  if (e.ai && e.ai.tags.length) meta.push(esc(e.ai.tags.slice(0, 3).join(" ")));
  return `<button class="entry-item" data-action="open-entry" data-id="${esc(e.id)}">
    <span class="date-col"><span class="dow ${dowClass}">${esc(e.weekday)}</span><span class="day">${day}</span><span class="time">${esc(e.time)}</span></span>
    <span class="body-col">
      <span class="title-row"><span class="title">${esc(title)}</span>${mood}</span>
      ${snippet ? `<span class="snippet">${esc(snippet)}</span>` : ""}
      ${meta.length ? `<span class="meta-row">${meta.map(m2 => `<span>${m2}</span>`).join("")}</span>` : ""}
    </span>
  </button>`;
}

// On This Day: 過去の年の同じ日付の日記をリスト先頭に出す（振り返りのきっかけ）
function onThisDayHTML() {
  const today = todayStr();
  const mmdd = today.slice(5);
  const hits = sortedEntries().filter(e => e.date.slice(5) === mmdd && e.date < today);
  if (!hits.length) return "";
  const cards = hits.map(e => {
    const years = Number(today.slice(0, 4)) - Number(e.date.slice(0, 4));
    const title = e.title || e.body.slice(0, SNIPPET_TITLE_LEN);
    return `<button class="entry-item" data-action="open-entry" data-id="${esc(e.id)}">
      <span class="date-col"><span class="otd-years">${years}年前</span></span>
      <span class="body-col">
        <span class="title-row"><span class="title">${esc(title)}</span>${effectiveMood(e) ? `<span class="mood-big">${moodSVG(effectiveMood(e), 22)}</span>` : ""}</span>
        <span class="snippet" style="-webkit-line-clamp:2">${esc(e.body)}</span>
      </span>
    </button>`;
  }).join("");
  return `<div class="otd-head">${icon("clock", 14)} 今日のこの日</div><div class="stack">${cards}</div>`;
}

// バックアップリマインダー: 「未バックアップのまま7日/初回未実施」のときだけリストに出す
const BACKUP_REMIND_DAYS = 7;
const BACKUP_SNOOZE_DAYS = 3;
function backupBannerHTML() {
  const s = state.data.settings;
  const n = state.data.entries.length;
  if (!n || n === s.lastBackupCount) return "";                                // 増えていなければ出さない
  if (s.backupSnoozedUntil && todayStr() < s.backupSnoozedUntil) return "";
  const stale = !s.lastBackupAt || dayDiff(s.lastBackupAt.slice(0, 10), todayStr()) >= BACKUP_REMIND_DAYS;
  if (!stale) return "";
  const diff = n - s.lastBackupCount;
  const msg = s.lastBackupAt
    ? `最後のバックアップから${dayDiff(s.lastBackupAt.slice(0, 10), todayStr())}日たっています（その後 ${diff} 件増加）`
    : `まだ一度もバックアップしていません（日記 ${n} 件）`;
  return `<div class="card" style="margin-bottom:16px">
    <div class="muted" style="font-size:13px;margin-bottom:8px">${icon("save", 14)} ${esc(msg)}</div>
    <div style="display:flex;gap:8px">
      <button class="ghost" style="flex:1" data-action="share-backup">今すぐバックアップ</button>
      <button class="ghost" style="flex:1" data-action="backup-later">あとで</button>
    </div>
  </div>`;
}

// 継続バナー: 今日まだ書いていないときだけ最上部に出す（書けば消える＝それ自体が達成感）
function streakBannerHTML() {
  if (!state.data.entries.length) return "";   // 初回はempty-noteが案内する
  const st = calcStreak();
  if (st.wroteToday) {
    if (st.current < 2) return "";
    const bestNote = st.current >= st.best && st.current >= 3 ? "（自己ベスト更新中！）" : "";
    return `<div class="streak-note">${icon("flame", 15)} ${st.current}日連続で書いています${esc(bestNote)}</div>`;
  }
  const msg = st.current > 0
    ? `連続${st.current}日で継続中。今日書けば${st.current + 1}日に伸びます`
    : `今日から連続記録を（再）スタートしましょう${st.best >= 2 ? `。これまでの最長は${st.best}日` : ""}`;
  return `<div class="card streak-card">
    <div style="font-size:13.5px">${icon("flame", 15)} ${esc(msg)}</div>
    <button class="ghost" data-action="go-write" style="margin-top:10px">今日の日記を書く（3分でOK）</button>
  </div>`;
}

function renderList() {
  const entries = sortedEntries();
  const bar = `<div class="topbar">
    <button class="search-lbl" data-action="go-help" title="ヘルプ" aria-label="ヘルプ">${icon("help", 14)} ヘルプ</button>
    <h1>日記</h1>
    <button class="search-lbl" data-action="go-search" title="検索" aria-label="検索">${icon("search", 14)} 単語検索</button></div>`;
  if (!entries.length) {
    return `${bar}<div class="empty-note">まだ日記がありません。<br>右下の ${icon("pen", 14)} から最初の1日を書いてみましょう。<br><br>使い方は左上の「${icon("help", 13)} ヘルプ」からいつでも見られます。</div>`;
  }
  // 月ごとにグループ化してから描画する
  const byMonth = new Map();
  for (const e of entries) {
    const month = e.date.slice(0, 7);
    if (!byMonth.has(month)) byMonth.set(month, []);
    byMonth.get(month).push(e);
  }
  const groups = [...byMonth.entries()].map(([month, list]) => {
    const [y, m] = month.split("-");
    return `<div class="month-head">${y}年${Number(m)}月</div><div class="stack">${list.map(e => entryCardHTML(e)).join("")}</div>`;
  });
  return bar + noticeBannerHTML() + streakBannerHTML() + backupBannerHTML() + onThisDayHTML() + groups.join("");
}

// --- 検索 ---
// 日付らしい入力（2026-07-08 / 7月8日 / 7/8 / 2026年7月 / 7月）は日付検索としても解釈する
function parseSearchDate(q) {
  let m = q.match(/^(\d{4})[-/年](\d{1,2})[-/月](\d{1,2})日?$/);
  if (m) return { type: "date", value: `${m[1]}-${pad(+m[2])}-${pad(+m[3])}` };
  m = q.match(/^(\d{1,2})[/月](\d{1,2})日?$/);
  if (m) return { type: "md", value: `${pad(+m[1])}-${pad(+m[2])}` };
  m = q.match(/^(\d{4})[-/年](\d{1,2})月?$/);
  if (m) return { type: "ym", value: `${m[1]}-${pad(+m[2])}` };
  m = q.match(/^(\d{1,2})月$/);
  if (m) return { type: "m", value: pad(+m[1]) };
  return null;
}

function searchHits() {
  const q = state.searchQuery.trim().toLowerCase();
  if (!q) return null;
  const d = parseSearchDate(q);
  return sortedEntries().filter(e => {
    if (d) {
      if (d.type === "date" && e.date === d.value) return true;
      if (d.type === "md" && e.date.slice(5) === d.value) return true;
      if (d.type === "ym" && e.date.slice(0, 7) === d.value) return true;
      if (d.type === "m" && e.date.slice(5, 7) === d.value) return true;
    }
    return (e.title + "\n" + e.body).toLowerCase().includes(q);
  });
}

function searchResultsHTML() {
  const hits = searchHits();
  if (hits === null) return `<div class="empty-note">キーワードで全部の日記から探せます</div>`;
  if (!hits.length) return `<div class="empty-note">「${esc(state.searchQuery.trim())}」は見つかりませんでした</div>`;
  return `<div class="muted" style="font-size:13px">${hits.length}件見つかりました</div>
    <div class="stack" style="margin-top:8px">${hits.map(e => entryCardHTML(e, { withMonth: true })).join("")}</div>`;
}

// --- カレンダー ---
function renderCalendar() {
  if (!state.calMonth) state.calMonth = todayStr().slice(0, 7);
  const [y, m] = state.calMonth.split("-").map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();
  const offset = new Date(y, m - 1, 1).getDay();  // 日曜始まり
  // 日付ごとの気分平均と最新エントリID
  const byDate = new Map();
  for (const e of sortedEntries()) {
    if (e.date.slice(0, 7) !== state.calMonth) continue;
    if (!byDate.has(e.date)) byDate.set(e.date, { moods: [], latestId: e.id });
    const mv = effectiveMood(e);
    if (mv != null) byDate.get(e.date).moods.push(mv);
  }
  const cells = [];
  for (let i = 0; i < offset; i++) cells.push(`<span class="cal-cell"></span>`);
  for (let d = 1; d <= daysInMonth; d++) {
    const date = `${y}-${pad(m)}-${pad(d)}`;
    const info = byDate.get(date);
    const today = date === todayStr() ? " today" : "";
    if (info) {
      const avg = average(info.moods);
      const mark = avg != null ? `<span class="mark">${moodSVG(Math.round(avg), 17)}</span>` : `<span class="dot"></span>`;
      cells.push(`<button class="cal-cell has${today}" data-action="cal-day" data-date="${date}"><span>${d}</span>${mark}</button>`);
    } else {
      cells.push(`<span class="cal-cell${today}"><span>${d}</span></span>`);
    }
  }
  const dow = WEEKDAYS.map(w =>
    `<span class="${w === "日" ? "sun" : w === "土" ? "sat" : ""}">${w}</span>`).join("");
  return `
    <div class="topbar"><span style="width:40px"></span><h1>カレンダー</h1><span style="width:40px"></span></div>
    <div class="card">
      <div class="cal-head">
        <button class="icon-btn" data-action="cal-move" data-delta="-1" aria-label="前の月">‹</button>
        <span class="cal-title">${y}年${m}月</span>
        <button class="icon-btn" data-action="cal-move" data-delta="1" aria-label="次の月">›</button>
      </div>
      <div class="cal-dow">${dow}</div>
      <div class="cal-grid">${cells.join("")}</div>
    </div>
    <div class="empty-note" style="font-size:12.5px">印のある日をタップすると日記が開きます</div>`;
}

// 日付変更。title/bodyの入力を消さないため、ヘッダーとラベルだけ部分更新する
function setDraftDate(dateStr) {
  if (!dateStr || dateStr > todayStr()) return;
  state.draft.date = dateStr;
  const isToday = dateStr === todayStr();
  document.getElementById("writeDate").textContent = displayDate(dateStr);
  document.querySelector("[data-action='draft-day'][data-delta='1']").disabled = isToday;
  const labels = document.querySelectorAll(".ask-label");
  if (labels.length >= 2) {
    labels[0].textContent = `${isToday ? "今日" : "この日"}は何点だった？`;
    labels[1].textContent = `${isToday ? "今日" : "この日"}の気分は？`;
  }
  document.getElementById("body").placeholder = `${isToday ? "今日" : "この日"}あったことを、そのまま書けばOK。`;
}

function shiftDraftDate(delta) {
  setDraftDate(addDays(state.draft.date, delta));
}

// 日付選択ポップアップ（未来日は選べない。月送りで過去の任意の日へ）
function renderDatePop() {
  const pop = document.getElementById("datePop");
  const [y, m] = state.popMonth.split("-").map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();
  const offset = new Date(y, m - 1, 1).getDay();  // 日曜始まり
  const cells = [];
  for (let i = 0; i < offset; i++) cells.push(`<span class="cal-cell"></span>`);
  for (let d = 1; d <= daysInMonth; d++) {
    const date = `${y}-${pad(m)}-${pad(d)}`;
    if (date > todayStr()) {
      cells.push(`<span class="cal-cell off"><span>${d}</span></span>`);
    } else {
      const cls = (date === state.draft.date ? " sel" : "") + (date === todayStr() ? " today" : "");
      cells.push(`<button class="cal-cell${cls}" data-action="pop-day" data-date="${date}"><span>${d}</span></button>`);
    }
  }
  const dow = WEEKDAYS.map(w =>
    `<span class="${w === "日" ? "sun" : w === "土" ? "sat" : ""}">${w}</span>`).join("");
  pop.innerHTML = `
    <div class="cal-head">
      <button class="icon-btn" data-action="pop-move" data-delta="-1" aria-label="前の月">‹</button>
      <span class="cal-title">${y}年${m}月</span>
      <button class="icon-btn" data-action="pop-move" data-delta="1" aria-label="次の月">›</button>
    </div>
    <div class="cal-dow">${dow}</div>
    <div class="cal-grid">${cells.join("")}</div>`;
  pop.hidden = false;
}

// AIセクション: 要約+タグ、未処理なら実行ボタン、処理中は表示
function entryAiHTML(e) {
  if (aiBusy.has(e.id)) return `<div class="entry-ai"><div class="muted" style="font-size:13px">${icon("sparkles", 14)} AIが要約中…</div></div>`;
  if (e.ai) {
    const tags = e.ai.tags.map(t => `<span class="badge">${esc(t)}</span>`).join("");
    const topics = (e.ai.topics || []).map(t => `<div>${icon("bulb", 14)} ${esc(t)}</div>`).join("");
    return `<div class="entry-ai">
      ${e.ai.summary ? `<div class="ai-summary">${esc(e.ai.summary)}</div>` : ""}

  return `<div class="entry-ai"><div class="digest-actions">

// テーマソングの表示（URLがあればタップで外部アプリを開くリンクにする）
function songLineHTML(song) {
  if (!song || (!song.title && !song.url)) return "";
  // 新形式（検索で選んだ曲）はジャケット＋プレビュー付きカード。旧形式は従来のピル表示
  if (song.artwork || song.preview) {
    const link = song.url && /^https?:\/\//i.test(song.url)
      ? `<a class="song-btn" href="${esc(song.url)}" target="_blank" rel="noopener noreferrer" title="Apple Musicで開く">${icon("share", 15)}</a>` : "";
    return `<div class="song-card">${songCardHTML(song, songPreviewBtnHTML(song) + link)}</div>`;
  }
  const label = song.title
    ? esc(song.title) + (song.artist ? ` — ${esc(song.artist)}` : "")
    : "テーマソング";
  const inner = `${icon("music", 14)} ${label}`;
  if (song.url && /^https?:\/\//i.test(song.url)) {
    return `<a class="song-line" href="${esc(song.url)}" target="_blank" rel="noopener noreferrer">${inner}</a>`;
  }
  return `<span class="song-line">${inner}</span>`;
}

// 日記の画像グリッド（src はIDB読み出し後に hydrateImages で流し込む）
function entryImagesHTML(images) {
  const items = images.map((im, i) =>
    `<button class="entry-img" data-action="view-image" data-id="${esc(im.id)}" aria-label="写真${i + 1}を拡大">
      <img data-img-id="${esc(im.id)}" alt="写真${i + 1}"></button>`).join("");
  return `<div class="entry-images">${items}</div>`;

// data-img-id を持つ<img>にIDBのobjectURLを流し込む（未設定のものだけ）
async function hydrateImages(container) {
  if (!container) return;
  for (const el of container.querySelectorAll("img[data-img-id]:not([src])")) {
    const url = await imageUrl(el.dataset.imgId);
    if (url) el.src = url; else el.closest(".entry-img, .img-thumb")?.remove();
  }
}

  const strip = document.getElementById("draftImages");

  if (!state.draft.images.length) { strip.innerHTML = ""; strip.hidden = true; return; }
  strip.hidden = false;
  strip.innerHTML = state.draft.images.map((im, i) =>

      <button class="img-del" data-action="remove-image" data-id="${esc(im.id)}" title="削除" aria-label="写真を削除">×</button></div>`).join("");

}

// --- 振り返り ---
function renderReview() {
  const kind = state.reviewKind;
  const seg = Object.entries(DIGEST_KINDS).map(([k, label]) =>
    `<button data-action="review-kind" data-kind="${k}" class="${kind === k ? "active" : ""}">${label}</button>`).join("");
  // 期間ごとにグループ化（新しい順）
  const keys = [...new Set(sortedEntries().map(e => periodKeyOf(kind, e.date)))];
  const cards = keys.map(key => {
    const entries = entriesInPeriod(kind, key);
    const st = periodStats(entries);
    const stats = [`日記${st.count}件`];
    if (st.avgScore != null) stats.push(`平均${st.avgScore}点`);
    if (st.avgMoodValue) stats.push(`気分${moodSVG(st.avgMoodValue, 14)}`);
    const digest = state.data.digests[kind][key];
    const genKey = `${kind}:${key}`;
    let bodyHtml;
    if (state.generating === genKey) {
      bodyHtml = `<div class="muted">まとめを生成中…</div>`;
    } else if (digest) {
      const stale = digest.count !== entries.length
        ? `<div class="stale-note">※生成後に日記が増えています</div>` : "";
      bodyHtml = `<div class="digest-text">${esc(digest.text)}</div>${stale}
        <div class="digest-actions"><button class="ghost small" data-action="gen-digest" data-kind="${kind}" data-key="${esc(key)}">再生成</button></div>`;
    } else {
      bodyHtml = `<div class="digest-actions"><button class="ghost small" data-action="gen-digest" data-kind="${kind}" data-key="${esc(key)}">AIまとめを生成</button></div>`;
    }
    const current = isCurrentPeriod(kind, key) ? `<span class="muted">（${{ week: "今週", month: "今月", year: "今年" }[kind]}）</span>` : "";
    return `<div class="card">
      <div class="period-head"><span class="label">${esc(periodLabel(kind, key))}${current}</span><span class="stats">${stats.join("・")}</span></div>
      ${bodyHtml}
    </div>`;
  }).join("");
  return `
    <div class="topbar"><span style="width:40px"></span><h1>振り返り</h1><span style="width:40px"></span></div>
    <div class="stack-lg">
      <div class="seg">${seg}</div>
      ${cards || '<div class="empty-note">日記を書くと、ここに期間ごとの振り返りが並びます。</div>'}
    </div>`;
}

function topicItemHTML(t, isUsed) {
