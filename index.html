function renderTopics() {
  const used = state.data.usedTopics;
  const items = allTopics();
  const fresh = items.filter(t => !used[t.key]);
  const done = items.filter(t => used[t.key]);
  // topics未抽出の日記（AI未処理 or 旧バージョンで処理済み）
  const pending = state.data.entries.filter(e => !e.ai || !Array.isArray(e.ai.topics)).length;
  let extractBtn = "";
  if (state.extracting) {
    extractBtn = `<button class="ghost" disabled>${icon("sparkles", 14)} 抽出中…（${state.extracting.done}/${state.extracting.total}）</button>`;
  } else if (pending) {
    extractBtn = `<button class="ghost" data-action="extract-topics">${icon("sparkles", 14)} 過去の日記からネタを抽出（残り${pending}件・一度に${Math.min(pending, TOPIC_BATCH)}件）</button>
      <div class="muted" style="font-size:12px;margin-top:6px">※AI要約・タグも一緒に作り直されます</div>`;
  }
  const freshList = fresh.length
    ? `<div class="stack">${fresh.map(t => topicItemHTML(t, false)).join("")}</div>`
    : `<div class="empty-note">${items.length ? "全部話しました！新しい日記を書くとまた貯まります。" : "まだネタがありません。日記を書くと、AIが「人に話したくなる話題」を拾ってここに貯めていきます。"}</div>`;
  const doneList = done.length
    ? `<details><summary>話した済み ${done.length}件 ▾</summary>
        <div class="stack" style="margin-top:8px">${done.map(t => topicItemHTML(t, true)).join("")}</div></details>`
    : "";
  return `
    <div class="topbar"><span style="width:40px"></span><h1>ネタ帳</h1><span style="width:40px"></span></div>
    <div class="stack-lg topics-sec">
      <div class="muted" style="font-size:13px">日記からAIが拾った会話のネタのストック。雑談の前にのぞいて、話したらチェック。</div>
      ${freshList}
      ${extractBtn ? `<div>${extractBtn}</div>` : ""}
      ${doneList}
    </div>`;
}

// 過去の日記への一括ネタ抽出。無料枠を守るため直列＋1回の上限付き
async function extractTopicsBatch() {
  if (state.extracting) return;
  if (!state.data.settings.apiKey) {
    toast("先に設定画面でGemini APIキーを登録してください");
    state.view = "settings"; render();
    return;
  }
  const targets = sortedEntries().filter(e => !e.ai || !Array.isArray(e.ai.topics)).slice(0, TOPIC_BATCH);
  state.extracting = { done: 0, total: targets.length };
  render();
  let ok = 0;
  try {
    for (const e of targets) {
      if (await processEntryAI(e)) ok++;
      state.extracting.done++;
      if (state.view === "topics") render();
      // 全滅（キー無効・上限等）が続くなら早めに打ち切る
      if (state.extracting.done >= 3 && ok === 0) break;
    }
  } finally {
    const failed = state.extracting.done - ok;
    state.extracting = null;
    if (state.view === "topics") render();
    toast(ok ? `${ok}件からネタを抽出しました${failed ? `（${failed}件失敗）` : ""}`
             : "抽出に失敗しました。APIキーや無料枠の上限を確認してください");
  }
}

// --- グラフ ---
// 日ごとに平均して {date, score, mood} の系列を作る
function dailySeries() {
  const byDate = new Map();
  for (const e of sortedEntries()) {
    if (!byDate.has(e.date)) byDate.set(e.date, { scores: [], moods: [] });
    const d = byDate.get(e.date);
    if (e.score != null) d.scores.push(e.score);
    const mv = effectiveMood(e);
    if (mv != null) d.moods.push(mv);
  }
  return [...byDate.entries()].sort((a, b) => a[0].localeCompare(b[0]))
    .map(([date, d]) => ({ date, score: average(d.scores), mood: average(d.moods) }));
}

function renderGraph() {
  const seg = GRAPH_RANGES.map(r =>
    `<button data-action="graph-range" data-days="${r.days}" class="${state.graphRange === r.days ? "active" : ""}">${r.label}</button>`).join("");
  let series = dailySeries();
  if (state.graphRange > 0) {
    const from = addDays(todayStr(), -state.graphRange);
    series = series.filter(p => p.date >= from);
  }
  const scorePts = series.filter(p => p.score != null);
  const moodPts = series.filter(p => p.mood != null);
  const st = periodStats(
    state.graphRange > 0
      ? sortedEntries().filter(e => e.date >= addDays(todayStr(), -state.graphRange))
      : sortedEntries());
  const stk = calcStreak();
  const tiles = `<div class="tiles">
    <div class="tile"><div class="num">${st.count}</div><div class="cap">日記</div></div>
    <div class="tile"><div class="num">${st.avgScore != null ? st.avgScore : "–"}</div><div class="cap">平均点</div></div>
    <div class="tile"><div class="num">${st.avgMoodValue ? moodSVG(st.avgMoodValue, 26) : "–"}</div><div class="cap">気分の平均</div></div>
    <div class="tile"><div class="num" style="color:#ff9e64">${stk.current}</div><div class="cap">連続日数${stk.best >= 2 ? `<br>最長${stk.best}日` : ""}</div></div>
  </div>`;
  const scoreChart = scorePts.length
    ? lineChartSVG(scorePts.map(p => ({ x: p.date, y: p.score })), { yMin: 0, yMax: 10, yTicks: [0, 5, 10], color: "var(--chart-score)", id: "score", fmt: v => `${Math.round(v * 10) / 10}点` })
    : `<div class="empty-note">点数を記録するとグラフが表示されます</div>`;
  const moodChart = moodPts.length
    ? lineChartSVG(moodPts.map(p => ({ x: p.date, y: p.mood })), {
        yMin: 0.5, yMax: 4.5, yTicks: [1, 2, 3, 4],
        yGlyph: (t, x, y) => `<g transform="translate(${(x - 16).toFixed(1)},${(y - 8).toFixed(1)}) scale(0.667)">${moodFaceInner(t)}</g>`,
        color: "var(--chart-mood)", id: "mood", dotsOnly: true,
        fmt: v => (moodOf(Math.round(v)) || {}).name || ""
      })
    : `<div class="empty-note">気分を記録するとグラフが表示されます</div>`;
  return `
    <div class="topbar"><span style="width:40px"></span><h1>グラフ</h1><span style="width:40px"></span></div>
    <div class="stack-lg">
      <div class="seg">${seg}</div>
      ${tiles}
      <div class="card chart-card"><h3>点数の推移</h3><div class="chart-wrap">${scoreChart}</div></div>
      <div class="card chart-card"><h3>気分の推移</h3><div class="chart-wrap">${moodChart}</div></div>
    </div>`;
}

// SVG折れ線/ドットチャート。データはグラフ描画時にdata-*へ埋め、hoverで読む
function lineChartSVG(points, opt) {
  const W = 560, H = 200, PAD_L = 34, PAD_R = 12, PAD_T = 12, PAD_B = 26;
  const iw = W - PAD_L - PAD_R, ih = H - PAD_T - PAD_B;
  const xs = points.map(p => p.x);
  const x0 = xs[0], x1 = xs[xs.length - 1];
  const span = Math.max(1, dayDiff(x0, x1));
  const px = p => PAD_L + iw * (xs.length === 1 ? 0.5 : dayDiff(x0, p.x) / span);
  const py = p => PAD_T + ih * (1 - (p.y - opt.yMin) / (opt.yMax - opt.yMin));
  const grid = opt.yTicks.map(t => {
    const y = PAD_T + ih * (1 - (t - opt.yMin) / (opt.yMax - opt.yMin));
    const label = opt.yGlyph
      ? opt.yGlyph(t, PAD_L - 8, y)
      : `<text x="${PAD_L - 8}" y="${y + 4}" text-anchor="end" font-size="11" fill="var(--muted)">${t}</text>`;
    return `<line x1="${PAD_L}" y1="${y}" x2="${W - PAD_R}" y2="${y}" stroke="var(--border)" stroke-width="1"/>${label}`;
  }).join("");
  // x軸ラベルは最初・中間・最後だけ（詰め込まない）
  const xIdx = [...new Set([0, Math.floor((points.length - 1) / 2), points.length - 1])];
  const xLabels = xIdx.map(i =>
    `<text x="${px(points[i])}" y="${H - 8}" text-anchor="middle" font-size="11" fill="var(--muted)">${shortDate(points[i].x)}</text>`).join("");
  const path = opt.dotsOnly || points.length === 1 ? "" :
    `<path d="${points.map((p, i) => `${i ? "L" : "M"}${px(p).toFixed(1)},${py(p).toFixed(1)}`).join(" ")}" fill="none" stroke="${opt.color}" stroke-width="2" stroke-linejoin="round"/>`;
  const dots = points.map((p, i) =>
    `<circle cx="${px(p).toFixed(1)}" cy="${py(p).toFixed(1)}" r="4" fill="${opt.color}" stroke="var(--surface)" stroke-width="2"/>`).join("");
  const data = esc(JSON.stringify(points.map(p => ({ x: px(p), y: py(p), date: p.date || p.x, v: opt.fmt(p.y) }))));
  return `<svg viewBox="0 0 ${W} ${H}" data-chart="${opt.id}" data-points="${data}" role="img" aria-label="推移グラフ">
    ${grid}${xLabels}${path}${dots}</svg>`;
}

function dayDiff(a, b) {
  return Math.round((new Date(b + "T00:00:00") - new Date(a + "T00:00:00")) / 86400000);
}

// hover/タップで最寄り点のツールチップを出す
function attachChartHover() {
  for (const svg of document.querySelectorAll("svg[data-chart]")) {
    const wrap = svg.closest(".chart-wrap");
    let tip = wrap.querySelector(".chart-tip");
    if (!tip) {
      tip = document.createElement("div");
      tip.className = "chart-tip";
      wrap.appendChild(tip);
    }
    const points = JSON.parse(svg.dataset.points);
    const show = clientX => {
      const rect = svg.getBoundingClientRect();
      const scale = rect.width / 560;
      const x = (clientX - rect.left) / scale;
      let best = points[0];
      for (const p of points) if (Math.abs(p.x - x) < Math.abs(best.x - x)) best = p;
      tip.textContent = `${shortDate(best.date)}　${best.v}`;
      tip.style.left = best.x * scale + "px";
      tip.style.top = best.y * scale + "px";
      tip.style.opacity = "1";
    };
    svg.addEventListener("pointermove", e => show(e.clientX));
    svg.addEventListener("pointerdown", e => show(e.clientX));
    svg.addEventListener("pointerleave", () => { tip.style.opacity = "0"; });
  }
}

// ===== 端末間同期（shimi-sync: 同期コード方式） =====
// 保存のたびに日記データを Cloudflare KV へ送信（デバウンス＋間引き）。起動時とタブ復帰時に取得。
// サーバーは楽観ロック(409)で「古い端末による黙った上書き」を拒否し、衝突したときだけ
// 日記ID単位でマージする。通常は新しい方をそのまま採用する（＝日記の削除も他端末へ伝わる）。
// 同期しないもの: APIキー・プッシュ通知の購読状態（端末ごと）・写真（IndexedDB保存のため）
const SYNC_URL = "https://shimi-sync.shimi-works.workers.dev/v1/ai-journal/";
const SYNC_LS_CODE = "ai-journal.sync.code", SYNC_LS_BASE = "ai-journal.sync.base", SYNC_LS_DIRTY = "ai-journal.sync.dirty";
const SYNC_MIN_GAP = 20000;   // 天気・AI要約の後追い保存が連続するため、送信は間引く

function syncCode() { return localStorage.getItem(SYNC_LS_CODE) || ""; }
function syncBase() { const v = localStorage.getItem(SYNC_LS_BASE); return v == null ? null : Number(v); }
function setSyncBase(t) { localStorage.setItem(SYNC_LS_BASE, String(t)); }
function syncDirtyAt() { return Number(localStorage.getItem(SYNC_LS_DIRTY) || 0); }

const saveDataCore = saveData;
saveData = function () {
  saveDataCore();
  if (!syncCode()) return;
  localStorage.setItem(SYNC_LS_DIRTY, String(Date.now()));
  schedulePush();
};

// 送信用データ: 端末固有・秘密のフィールドを抜いたコピー
function syncSanitize(data) {
  const d = JSON.parse(JSON.stringify(data));
  d.settings.apiKey = "";
  d.settings.push = {
    serverUrl: d.settings.push.serverUrl || "",
    vapidPublicKey: d.settings.push.vapidPublicKey || "",
    enabled: false, endpoint: null
  };
  return d;
}
// 受信データを反映（この端末のAPIキー・購読状態は維持する）
function syncApply(remoteData) {
  const local = state.data;
  const d = migrateData(JSON.parse(JSON.stringify(remoteData)));
  d.settings.apiKey = local.settings.apiKey;
  d.settings.push.enabled = local.settings.push.enabled;
  d.settings.push.endpoint = local.settings.push.endpoint;
  if (!d.settings.push.serverUrl) d.settings.push.serverUrl = local.settings.push.serverUrl;
  if (!d.settings.push.vapidPublicKey) d.settings.push.vapidPublicKey = local.settings.push.vapidPublicKey;
  state.data = d;
  saveDataCore();
  applyTheme();
  render();
}
function mergeSyncData(L, R, localNewer) {
  const P = localNewer ? L : R, S = localNewer ? R : L;   // P=新しい側を優先
  const out = JSON.parse(JSON.stringify(P));
  // 日記はID単位の和集合。同じIDを両方で編集していたら新しい側を採用
  const byId = new Map((S.entries || []).map(e => [e.id, e]));
  (P.entries || []).forEach(e => byId.set(e.id, e));
  out.entries = [...byId.values()].sort((a, b) => (a.id < b.id ? -1 : 1));
  for (const kind of ["week", "month", "year"]) {
    out.digests[kind] = { ...((S.digests || {})[kind] || {}), ...((P.digests || {})[kind] || {}) };
  }
  out.usedTopics = { ...(S.usedTopics || {}), ...(P.usedTopics || {}) };
  out.v = Math.max(L.v || 0, R.v || 0);
  return out;
}
let syncTimer = null, syncBusy = false, syncQueued = false, syncLastPush = 0;
function schedulePush() {
  clearTimeout(syncTimer);
  const wait = Math.max(2500, SYNC_MIN_GAP - (Date.now() - syncLastPush));
  syncTimer = setTimeout(doPush, wait);
}
function syncStatusMsg(t) { const el = document.getElementById("syncStatus"); if (el) el.textContent = t; }
function syncTime() { const d = new Date(); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
async function adoptRemote(remote) {
  const dirtyAt = syncDirtyAt();
  if (!dirtyAt) {   // 未送信のローカル変更なし→リモートをそのまま採用（他端末での削除もここで反映される）
    syncApply(remote.data || defaultData());
    setSyncBase(remote.updatedAt);
    syncStatusMsg("同期済み（" + syncTime() + "）");
    return;
  }
  // 両方に変更がある（衝突）→ 日記ID単位でマージして再送。この場合のみ削除が復活しうる
  const merged = mergeSyncData(syncSanitize(state.data), remote.data || defaultData(), dirtyAt > remote.updatedAt);
  syncApply(merged);
  setSyncBase(remote.updatedAt);
  await doPush();
}
async function doPush() {
  const code = syncCode(); if (!code) return;
  if (syncBusy) { syncQueued = true; return; }
  syncBusy = true; clearTimeout(syncTimer);
  try {
    const body = { baseUpdatedAt: syncBase(), updatedAt: Date.now(), data: syncSanitize(state.data) };
    const res = await fetch(SYNC_URL + code, { method: "PUT", headers: { "content-type": "application/json" }, body: JSON.stringify(body) });
    if (res.status === 409) { const remote = await res.json(); syncBusy = false; await adoptRemote(remote); return; }
    if (!res.ok) throw new Error("HTTP " + res.status);
    syncLastPush = Date.now();
    setSyncBase(body.updatedAt);
    localStorage.removeItem(SYNC_LS_DIRTY);
    syncStatusMsg("同期済み（" + syncTime() + "）");
  } catch (e) {
    syncStatusMsg("同期できませんでした（オフライン？）。次の保存時に自動で再送します。");
  } finally {
    syncBusy = false;
    if (syncQueued) { syncQueued = false; schedulePush(); }
  }
}
async function doPull() {
  const code = syncCode(); if (!code) return;
  try {
    const res = await fetch(SYNC_URL + code);
    if (res.status === 404) { await doPush(); return; }   // クラウド側が空→この端末の日記を初回アップロード
    if (!res.ok) throw new Error("HTTP " + res.status);
    const remote = await res.json();
    if (remote.updatedAt !== syncBase()) await adoptRemote(remote);
    else if (syncDirtyAt()) await doPush();
    else syncStatusMsg("同期済み（" + syncTime() + "）");
  } catch (e) {
    syncStatusMsg("同期できませんでした（オフライン？）。接続後に自動で再試行します。");
  }
}
function syncNewCode() {
  const cs = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";   // 紛らわしい I/L/O/0/1 は使わない
  const buf = new Uint32Array(20); crypto.getRandomValues(buf);
  const s = [...buf].map(n => cs[n % cs.length]);
  return [0, 1, 2, 3, 4].map(i => s.slice(i * 4, i * 4 + 4).join("")).join("-");
}
function syncIssue() {
  localStorage.setItem(SYNC_LS_CODE, syncNewCode());
  localStorage.removeItem(SYNC_LS_BASE);
  if (state.view === "settings") render();
  toast("同期コードを発行しました。他の端末で「コードを入力」してください");
  doPush();
}
function syncEnter() {
  const raw = prompt("他の端末で発行した同期コードを入力してください（例: ABCD-EFGH-JKMN-PQRS-TUVW）");
  if (raw === null) return;
  const code = raw.trim().toUpperCase();
  if (!/^[A-HJ-NP-Z2-9]{4}(-[A-HJ-NP-Z2-9]{4}){4}$/.test(code)) { toast("コードの形式が正しくありません"); return; }
  localStorage.setItem(SYNC_LS_CODE, code);
  localStorage.removeItem(SYNC_LS_BASE);
  localStorage.setItem(SYNC_LS_DIRTY, String(Date.now()));   // この端末の日記もマージで残す
  if (state.view === "settings") render();
  syncStatusMsg("同期しています…");
  doPull();
}
function syncOff() {
  if (!confirm("この端末の同期を解除しますか？（日記は消えません。クラウド上のデータも残ります）")) return;
  localStorage.removeItem(SYNC_LS_CODE);
  localStorage.removeItem(SYNC_LS_BASE);
  localStorage.removeItem(SYNC_LS_DIRTY);
  if (state.view === "settings") render();
}
function syncInit() {
  if (syncCode()) doPull();
  document.addEventListener("visibilitychange", () => {   // タブ復帰時に取得（端末の切替を想定）
    if (document.visibilityState === "visible" && syncCode() && !syncBusy) doPull();
  });
}

// ===== 通知リマインダー（.icsカレンダー予定でOSに毎日通知させる） =====
// サーバー無しのWebアプリは自力でプッシュ通知を送れないため、OSカレンダーに
// 「毎日この時刻に日記を書く」という繰り返し予定（アラーム付き）を登録してもらう方式。
const APP_URL = "https://shimi-works.github.io/ai-journal/";

// iCalは行末CRLF、,;\ をエスケープする仕様
function icsEscape(s) {
  return String(s).replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n");
}

function buildReminderIcs(time) {
  const [h, m] = time.split(":");
  // 予定の開始日は今日。UNTILやCOUNTを付けず、無期限の毎日繰り返しにする
  const now = new Date();
  const dt = `${fmtDate(now).replace(/-/g, "")}T${h}${m}00`;
  // DTSTAMPは生成時刻（UTC・秒精度）。end=start+15分
  const stamp = now.toISOString().replace(/[-:]/g, "").slice(0, 15) + "Z";
  const endMin = (Number(m) + 15) % 60;
  const endHour = (Number(h) + (Number(m) + 15 >= 60 ? 1 : 0)) % 24;
  const dtEnd = `${fmtDate(now).replace(/-/g, "")}T${pad(endHour)}${pad(endMin)}00`;
  const uid = `aijournal-reminder-${dt}@shimi-works`;
  const desc = `今日の一日を3分で振り返りましょう。\n${APP_URL}`;
  return [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//AI Journal//JP",
    "CALSCALE:GREGORIAN",
    "BEGIN:VEVENT",
    `UID:${uid}`,
    `DTSTAMP:${stamp}`,
    `DTSTART:${dt}`,
    `DTEND:${dtEnd}`,
    "RRULE:FREQ=DAILY",
    "SUMMARY:AI Journal — 今日の日記を書く",
    `DESCRIPTION:${icsEscape(desc)}`,
    `URL:${APP_URL}`,
    "BEGIN:VALARM",
    "ACTION:DISPLAY",
    "DESCRIPTION:今日の日記を書く",
    "TRIGGER:PT0M",
    "END:VALARM",
    "END:VEVENT",
    "END:VCALENDAR",
    ""   // 末尾CRLF（RFC 5545推奨。厳格なパーサ対策）
  ].join("\r\n");
}

async function addReminder() {
  const time = state.data.settings.reminderTime || "21:00";
  const ics = buildReminderIcs(time);
  const file = new File([ics], "ai-journal-reminder.ics", { type: "text/calendar" });
  // iPhoneは共有シート→カレンダーに追加が最短。非対応環境はファイルDL（PC等）
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: "AI Journal リマインダー" });
    } catch (e) { /* キャンセルは何もしない */ }
  } else {
    downloadFile("ai-journal-reminder.ics", ics, "text/calendar");
    toast("カレンダーファイルを保存しました。開いて追加してください");
  }
}

// ===== 本物のプッシュ通知（Web Push・送信役は本人のCloudflare Worker） =====
// 仕組み: このPWAで購読を作り、購読情報＋希望時刻を送信役へ登録する。送信役は毎日その時刻に
//        Web Push（VAPID署名）を送り、Service Workerが通知を表示する。サーバー費用は無料枠内。
function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(base64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

function pushSupported() {
  return "serviceWorker" in navigator && "PushManager" in window && "Notification" in window
    && location.protocol === "https:";
}

// 送信役と公開鍵は「設定にあればそれ、無ければ既定（作者の共用送信役）」を使う。
// 末尾スラッシュは外してパスを足しやすくする。
function effectivePushServer() {
  return (state.data.settings.push.serverUrl || DEFAULT_PUSH_SERVER).trim().replace(/\/+$/, "");
}
function effectiveVapidKey() {
  return (state.data.settings.push.vapidPublicKey || DEFAULT_VAPID_PUBLIC_KEY).trim();
}

async function enablePush() {
  const p = state.data.settings.push;
  if (!pushSupported()) {
    toast("この環境ではプッシュ通知を使えません（iPhoneはホーム画面に追加したうえで開いてください）");
    return;
  }
  try {
    const perm = await Notification.requestPermission();
    if (perm !== "granted") { toast("通知が許可されませんでした"); return; }
    const reg = await navigator.serviceWorker.ready;
    // 公開鍵を変えた場合に備え、既存購読があれば作り直す
    const existing = await reg.pushManager.getSubscription();
    if (existing) await existing.unsubscribe().catch(() => {});
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(effectiveVapidKey())
    });
    const res = await fetch(effectivePushServer() + "/subscribe", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({
        subscription: sub.toJSON(),
        time: state.data.settings.reminderTime || "21:00",
        tz: Intl.DateTimeFormat().resolvedOptions().timeZone || "Asia/Tokyo"
      })
    });
    if (!res.ok) {
      let detail = `(${res.status})`;
      try { const b = await res.json(); if (b.error) detail = b.error; } catch (_) {}
      throw new Error("送信役への登録に失敗: " + detail);
    }
    p.enabled = true;
    p.endpoint = sub.endpoint;
    saveData(); render();
    toast("プッシュ通知を有効にしました");
  } catch (err) {
    toast("有効化に失敗: " + err.message);
    console.error(err);
  }
}

async function disablePush() {
  const p = state.data.settings.push;
  try {
    if ("serviceWorker" in navigator) {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        const endpoint = sub.endpoint;
        await sub.unsubscribe().catch(() => {});
        if (effectivePushServer()) {
          // 送信役からも購読を消す（失敗しても購読解除は済んでいるので握りつぶす）
          fetch(effectivePushServer() + "/unsubscribe", {
            method: "POST", headers: { "content-type": "application/json" },
            body: JSON.stringify({ endpoint })
          }).catch(() => {});
        }
      }
    }
  } catch (err) {
    console.warn("disablePush:", err.message);
  }
  p.enabled = false;
  p.endpoint = null;
  saveData(); render();
  toast("プッシュ通知を無効にしました");
}

// 有効時に希望時刻を変えたら、送信役の登録時刻も更新する
async function updatePushTime() {
  const p = state.data.settings.push;
  if (!p.enabled || !effectivePushServer() || !p.endpoint) return;
  try {
    await fetch(effectivePushServer() + "/subscribe", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({
        endpoint: p.endpoint,
        time: state.data.settings.reminderTime || "21:00",
        tz: Intl.DateTimeFormat().resolvedOptions().timeZone || "Asia/Tokyo"
      })
    });
  } catch (err) { console.warn("updatePushTime:", err.message); }
}

// 送信役の /test を叩いて、その場でテスト通知を送ってもらう（設定確認用）
async function sendTestPush() {
  const p = state.data.settings.push;
  if (!p.enabled || !p.endpoint) { toast("先にプッシュ通知を有効にしてください"); return; }
  try {
    const res = await fetch(effectivePushServer() + "/test", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ endpoint: p.endpoint })
    });
    let body = {};
    try { body = await res.json(); } catch (_) {}
    if (!res.ok) { toast("テスト送信に失敗: " + (body.error || `(${res.status})`)); return; }
    // 送信役は届けたが、プッシュサービスが受け付けなかった場合（VAPID鍵の不一致など）
    if (body.status && (body.status < 200 || body.status >= 300)) {
      toast(`送信先が受け付けませんでした (${body.status})` + (body.detail ? `: ${body.detail}` : "")); return;
    }
    toast("テスト通知を送りました。数秒待っても来なければ通知許可を確認してください");
  } catch (err) {
    toast("テスト送信に失敗: " + err.message);
  }
}

// ===== toast =====
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), TOAST_MS);
}

// ===== イベント =====
// entryは開いた元の画面（検索・カレンダー等）に戻す。それ以外はリストへ
function backToList() {
  state.view = state.view === "entry" && state.entryFrom ? state.entryFrom : "list";
  state.entryId = null;
  render();
}

function leaveWriteSafely() {
  const body = document.getElementById("body");
  const title = document.getElementById("title");
  const orig = state.editingId ? (findEntry(state.editingId) || {}) : {};
  // タイトルだけ書いた状態も「書きかけ」として扱う
  const imagesChanged = JSON.stringify(state.draft.images.map(im => im.id))
    !== JSON.stringify(state.draftImagesOrig || []);
  const songChanged = JSON.stringify(readDraftSong()) !== JSON.stringify(orig.song || null);
  const dirty = (body && body.value.trim() && body.value.trim() !== (orig.body || "").trim())
    || (title && title.value.trim() && title.value.trim() !== (orig.title || "").trim())
    || imagesChanged || songChanged;
  if (dirty && !confirm("書きかけの内容を破棄しますか？")) return;
  cleanupDraftImages(false);   // 今回追加して未保存の画像はIDBから消す
  if (state.editingId) {
    // 編集をやめたら元のentry表示に戻る
    const id = state.editingId;
    state.editingId = null;
    state.view = "entry"; state.entryId = id; render();
  } else {
    backToList();
  }
}

// ===== テーマソング（Apple Music検索＋30秒プレビュー） =====
// iTunes Search API（無料・キー不要）で曲を検索する。CORSが不安定なためJSONPで呼ぶ。
// 選んだ曲は { title, artist, url(Apple Musicリンク), artwork(ジャケット), preview(30秒試聴URL) }。
// 旧形式（手入力のtitle/artist/urlだけ）のデータもそのまま表示できる。
let itunesSeq = 0;
let songSearchTimer = null;
const ITUNES_QS = "media=music&entity=song&country=JP&lang=ja_jp&limit=8&term=";
function normalizeItunes(data) {
  return (data.results || []).map(r => ({
    title: r.trackName || "",
    artist: r.artistName || "",
    url: r.trackViewUrl || "",
    artwork: r.artworkUrl100 || r.artworkUrl60 || "",
    preview: r.previewUrl || ""
  })).filter(r => r.title);
}
async function itunesSearch(term) {
  // ①通常のfetch。AppleはOriginヘッダ付きのリクエストにはCORS許可を返すのでこれが本命
  //   （iOSではJSONPのscript注入がコンテンツブロッカー等に弾かれる報告があるため）
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 8000);
    const res = await fetch("https://itunes.apple.com/search?" + ITUNES_QS + encodeURIComponent(term),
      { signal: ctrl.signal });
    clearTimeout(timer);
    if (res.ok) return normalizeItunes(await res.json());
  } catch (e) { console.warn("itunes fetch失敗 → JSONPで再試行:", e); }
  // ②JSONPフォールバック（fetchがCORSで落ちる環境向け）
  return new Promise((resolve, reject) => {
    const cb = "_itunesCb" + (itunesSeq++);
    const script = document.createElement("script");
    const timer = setTimeout(() => { cleanup(); reject(new Error("timeout")); }, 10000);
    function cleanup() { clearTimeout(timer); delete window[cb]; script.remove(); }
    window[cb] = data => { cleanup(); resolve(normalizeItunes(data)); };
    script.onerror = () => { cleanup(); reject(new Error("network")); };
    script.src = "https://itunes.apple.com/search?" + ITUNES_QS + encodeURIComponent(term) + "&callback=" + cb;
    document.head.appendChild(script);
  });
}

// 30秒プレビューの再生（同時に1曲だけ）
let previewAudio = null, previewingUrl = null;
function stopPreview() {
  if (previewAudio) { previewAudio.pause(); previewAudio = null; }
  previewingUrl = null;
}
function refreshSongUI() {
  if (state.view === "write") {
    const el = document.getElementById("songArea");
    if (el) el.innerHTML = songAreaHTML();
  } else {
    render();   // entry画面などは丸ごと描き直してよい（入力欄がない）
  }
}
function togglePreview(url) {
  if (previewingUrl === url) { stopPreview(); refreshSongUI(); return; }
  stopPreview();
  previewAudio = new Audio(url);
  previewingUrl = url;
  previewAudio.onended = () => { stopPreview(); refreshSongUI(); };
  previewAudio.play().catch(() => { stopPreview(); toast("プレビューを再生できませんでした"); refreshSongUI(); });
  refreshSongUI();
}

function songCardHTML(s, actions) {
  const art = s.artwork
    ? `<img src="${esc(s.artwork)}" alt="" loading="lazy">`
    : `<span class="song-art-ph">${icon("music", 20)}</span>`;
  const meta = `<div class="song-meta"><div class="t">${esc(s.title || s.url)}</div><div class="a">${esc(s.artist || "")}</div></div>`;
  return art + meta + (actions || "");
}
function songPreviewBtnHTML(s) {
  if (!s.preview) return "";
  return `<span class="song-btn" role="button" data-action="song-preview" data-url="${esc(s.preview)}" title="30秒プレビュー">${previewingUrl === s.preview ? icon("stop", 15) : icon("play", 15)}</span>`;
}
function songAreaHTML() {
  const s = state.draft.song;
  if (s && (s.title || s.url)) {
    return `<div class="song-card">${songCardHTML(s,
      songPreviewBtnHTML(s) + `<span class="song-btn" role="button" data-action="song-clear" title="曲をはずす">✕</span>`)}</div>`;
  }
  return `<div class="song-fields">
    <input type="text" id="songSearch" placeholder="曲名やアーティストで検索（Apple Music）" autocomplete="off" value="${esc(state.songQuery)}">
    <div id="songResults" class="song-results">${songResultsHTML()}</div>
  </div>`;
}
function songResultsHTML() {
  if (state.songSearching) return `<div class="label">検索中…</div>`;
  if (state.songError) return `<div class="label">検索できませんでした（通信エラー）。電波やWi-Fi、広告ブロッカーを確認してみてください</div>`;
  if (!state.songResults) return "";
  if (!state.songResults.length) return `<div class="label">見つかりませんでした</div>`;
  return state.songResults.map((r, i) =>
    `<button type="button" class="song-card" data-action="song-pick" data-idx="${i}">${songCardHTML(r, songPreviewBtnHTML(r))}</button>`
  ).join("");
}

// 保存用に下書きの曲を返す。未選択ならnull
function readDraftSong() {
  const s = state.draft.song;
  return s && (s.title || s.url) ? s : null;
}

function handleSave() {
  const title = document.getElementById("title").value.trim();
  const body = document.getElementById("body").value.trim();
  if (!body) { toast("本文が空です"); return; }
  const song = readDraftSong();
  if (state.editingId) {
    const e = findEntry(state.editingId);
    state.editingId = null;
    if (e) {
      const dateChanged = e.date !== state.draft.date;
      const contentChanged = e.title !== title || e.body !== body;
      e.title = title; e.body = body; e.mood = state.draft.mood; e.score = state.draft.score;
      e.images = [...state.draft.images]; e.song = song;
      cleanupDraftImages(true);
      if (dateChanged) {
        e.date = state.draft.date;
        e.weekday = WEEKDAYS[new Date(e.date + "T12:00:00").getDay()];
        e.id = `${e.date}T${e.id.split("T")[1]}`;  // 並び順はIDに依存するため日付部分を差し替える
        e.weather = null;  // 天気は元の日付のもの。日付が変わったら意味を失う
        if (e.date === todayStr()) {
          // 今日に変えたなら新規保存と同じく天気を後追い取得する
          fetchWeather(state.data.settings.location).then(w => {
            if (!w || e.date !== todayStr()) return;
            e.weather = w;
            saveData();
            if (state.view === "list" || (state.view === "entry" && state.entryId === e.id)) render();
          });
        }
      }
      if (contentChanged) {
        e.ai = null;   // 要約・タグは古い本文のもの。作り直す
        processEntryAI(e);
      }
      saveData();
      state.view = "entry"; state.entryId = e.id; render();
      toast("更新しました");
      return;
    }
  }
  const savedDate = state.draft.date;
  saveEntry(title, body, state.draft.mood, state.draft.score, savedDate, [...state.draft.images], song);
  cleanupDraftImages(true);
  backToList();
  // 今日の分を書いたら連続日数でお祝い（節目は強めに）。続けたくなる小さなご褒美
  const st = calcStreak();
  if (savedDate === todayStr() && st.current >= 2) {
    toast(STREAK_MILESTONES.includes(st.current)
      ? `${st.current}日連続達成！すごい！`
      : `保存しました（${st.current}日連続）`);
  } else {
    toast("保存しました");
  }
}

// 検索はライブ絞り込み。入力を消さないよう結果エリアだけ更新する
document.addEventListener("input", e => {
  if (e.target.id === "searchBox") {
    state.searchQuery = e.target.value;
    document.getElementById("searchResults").innerHTML = searchResultsHTML();
  } else if (e.target.id === "lockPass" && e.target.value.length === 4) {
    tryUnlock();   // 4桁入れたら自動で判定（開くボタンを押す手間を省く）
  } else if (e.target.id === "songSearch") {
    // テーマソング検索: 入力が止まって400ms後に検索（結果エリアだけ差し替えて入力を保つ）
    state.songQuery = e.target.value;
    clearTimeout(songSearchTimer);
    const q = e.target.value.trim();
    const box = () => document.getElementById("songResults");
    if (q.length < 2) {
      state.songResults = null; state.songSearching = false; state.songError = false;
      if (box()) box().innerHTML = "";
      return;
    }
    songSearchTimer = setTimeout(async () => {
      state.songSearching = true; state.songError = false;
      if (box()) box().innerHTML = songResultsHTML();
      try { state.songResults = await itunesSearch(q); }
      catch (err) { console.error(err); state.songResults = []; state.songError = true; }
      state.songSearching = false;
      if (box()) box().innerHTML = songResultsHTML();
    }, 400);
  }
});

document.addEventListener("keydown", e => {
  if (state.view === "lock") {
    if (e.key === "Enter") { e.preventDefault(); tryUnlock(); }
    return;  // ロック中はEscでも抜けられない
  }
  const lb = document.getElementById("lightbox");
  if (e.key === "Escape" && lb && !lb.hidden) {   // 拡大表示中はまずそれを閉じる
    lb.hidden = true; document.getElementById("lightboxImg").removeAttribute("src"); return;
  }
  if (e.key === "Escape" && state.view !== "list") {
    state.view === "write" ? leaveWriteSafely() : backToList();
  } else if (e.key === "Enter" && (e.ctrlKey || e.metaKey) && state.view === "write") {
    e.preventDefault();
    handleSave();
  }
});

document.getElementById("importFile").addEventListener("change", e => {
  const file = e.target.files[0];
  if (file) importJson(file);
  e.target.value = "";
});

document.getElementById("importTextFile").addEventListener("change", e => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = () => importTextEntries(String(reader.result));
    reader.readAsText(file);
  }
  e.target.value = "";
});

document.getElementById("importZipFile").addEventListener("change", e => {
  const file = e.target.files[0];
  if (file) importZip(file);
  e.target.value = "";
});

document.getElementById("imageFile").addEventListener("change", e => {
  if (e.target.files && e.target.files.length) addDraftImages(e.target.files);
  e.target.value = "";
});

// ライトボックス（拡大表示）はどこをタップしても閉じる
document.getElementById("lightbox").addEventListener("click", () => {
  const lb = document.getElementById("lightbox");
  lb.hidden = true;
  document.getElementById("lightboxImg").removeAttribute("src");
});

// ===== 起動 =====
// ナビとFABのアイコンを注入（静的HTML側に絵文字を残さない）
const NAV_ICONS = { list: "list", calendar: "calendar", review: "refresh", graph: "chart", topics: "bulb", settings: "sliders" };
for (const b of document.querySelectorAll("#nav button")) {
  b.querySelector(".ico").innerHTML = icon(NAV_ICONS[b.dataset.view], 20);
}
document.getElementById("fab").innerHTML = icon("pen", 24);
state.data = loadData();
// マイグレーションした場合だけ書き戻す。パース不能な壊れたデータは上書きしない
try {
  const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
  if (raw && raw.v !== state.data.v) saveData();
} catch (_) {}
applyTheme();
if (state.data.settings.passcodeHash) state.view = "lock";
render();
// 顔認証設定済みなら、開いた瞬間に自動で顔認証をかける（失敗したらボタンから再試行できる）
if (state.view === "lock" && bioRec()) setTimeout(() => bioUnlock(true), 250);
// iOSは「画面操作なしのWebAuthn起動」を拒否することがあるため、その保険を二重にかける:
// ①ロック画面ならどこをタップしても顔認証が走る（ボタンを狙わなくていい）
document.addEventListener("pointerdown", e => {
  if (state.view !== "lock" || state.lockShowPass || !bioRec() || bioBusy) return;
  const el = e.target.closest("[data-action]");
  if (el && el.dataset.action !== "bio-unlock") return;   // 「パスワードで開く」等の操作は邪魔しない
  bioUnlock();
});
// ②バックグラウンドから戻ってきた時も自動で再試行する
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && state.view === "lock" && !state.lockShowPass && bioRec()) {
    bioUnlock(true);
  }
});
syncInit();
// ブラウザに「このサイトのデータを消さないで」と頼む（対応環境のみ。長期保存の保険）
if (navigator.storage && navigator.storage.persist) navigator.storage.persist().catch(() => {});
// PWA（オフライン起動）用。ローカルファイル起動(file://)ではSWは使えないのでスキップ
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("./sw.js").catch(() => {});
}
// 新しいバージョンの公開を検知して知らせる。PWAのキャッシュは「次に開いたとき」に
// しか更新されないため、気づかず古い版を使い続ける事故が実際に起きた（2026-07-15）。
// クエリ付きURLでSWとCDNのキャッシュを両方すり抜けて、公開中のAPP_BUILDと比べる。
if (location.protocol === "https:") {
  setTimeout(async () => {
    try {
      const res = await fetch("./index.html?vcheck=" + Date.now(), { cache: "no-store" });
      if (!res.ok) return;
      const m = (await res.text()).match(/APP_BUILD = "([^"]+)"/);
      if (m && m[1] !== APP_BUILD) {
        toast(`新しいバージョン（${m[1]}）があります。アプリを閉じて開き直すと更新されます`);
      }
    } catch (_) { /* オフライン時などは黙ってスキップ */ }
  }, 4000);
}
</script>
</body>
</html>
